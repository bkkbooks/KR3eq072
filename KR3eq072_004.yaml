body:
  text: 卷之四擇醫療病不在臨時而在平時能幹平日知得深信得確則臨病相延不患不濟事也居安思危處常思變保身之切要今夫世之擇醫者在平日則恬不經心及有病即手忙腳亂妄聽妄從有謂此良遂延此者有謂彼良更延彼者甚至道途之人絶不曉醫為何事而或徇其舉薦之情無一不可延之者幸而愈以為得人不愈則曰疾既已劇無可奈何甘下泉而不悔矣人情世態大抵如斯愚者不怪智者亦比比如之可勝悼嘆醫家之誤人有六有學無識一也有識無膽二也知常不知變三也意有他屬四也心煩冗沓時五也偶值精神疲倦六也為醫者不可不深加自省也至有一等重惜名譽知有生機而袖手更有一等中懷勢利因貴賤貧富而岐心甚有一等未經明理強作知醫而率意妄投湯劑以致誤彼蒼生者又不可與醫類同日而語也昔胡孝轅先生深痛醫道之衰忽不自覺其失聲曰善醫者吾不得而見之矣得見善學者斯可矣豫曰善學者吾不得而見之矣得見善問者斯可矣自此三十有年來絶不見一善問者善問者必善學徐東皋云古醫十四科而今亡之矣道藏經中頗有是說自宋元以來止有十三科考醫政其一為風科次傷寒科次大方脈科次小方脈科次婦人胎産科次針灸科次眼科次咽候口齒科次瘡瘍科次正骨科次金鏃科次養生科次祝由科國朝亦唯取十三科而已其脾胃一科終莫之續元之李東垣先生著脾胃論極其精詳但不言十四科之缺不知其得舊本而加已意抑盡為創著而得上古之同然歟是誠醫道之大幸也凡本病中有兼胸腹不利飲食少餐與噁心嘈雜嘔吐痞悶作痛作脹作瀉一二症者便是脾胃有病當先調治脾胃而後用本病之藥亦有不必用本病之藥而本病亦自能因脾胃之愈而與之俱愈者即或本病之勢不容緩不得不捨脾胃而先治之者亦勿得終置脾胃於罔聞也何也脾胃者元氣轉輸之關也宜行不宜滯一有滯元氣即不克轉輸藥石亦因以滯而不化不能取驗矣東垣所謂非藥之不能治病也元氣之不行藥力也此固人身中自然之至理知之則能令人生不知則未有不致人於死者故本刻中不避重復之嫌每曉曉不已惜乎世都不明此理每聞豫言輒掩耳而走曰此老生常談耳及察其臨證所施之法所裁之方則又似絶不知老生常談者見寒病唯知有治寒之藥而已矣見熱病唯知有治熱之藥而已矣見血病氣病唯知有治血治氣之藥而已矣全不計及脾胃之有病不病也即或有能計及者亦不過述前人所謂脾胃為一身之主而以白朮參苓山藥薏苡仁之類加減於治寒治熱治血治氣之藥中而已矣更有他乎噫嘻此皆不知調治脾胃之法之不易易故耳調治脾胃之法有從主不從容者有從客不從主者有欲攻之而先補之者有欲補之而先攻之者有補多而瀉少者有補少而瀉多者有舍湯就丸而變丸為散者有旦同夕異而旦異夕同者又自有勿藥而愈節飲而愈灼艾而愈專事適口之味而愈者不可以成見拘古方執與語言盡也何以謂之從主不從客昔一人腸胃堅結大便不行客邪其實矣余見其形瘠而脈遲知為中氣虛寒之侯專此參歸薑桂連服五六月絶不行結而結自行又一人腸血與寒熱醫都舍脾而施治余診之關獨沉而噁心不知味則知其積飲傷脾致生寒熱並不能攝血歸經耳與之逐飲扶脾而諸證咸失舉若此者即從主不從客之調治脾胃法也何以謂之從客不從主昔一人脾泄經年補之澀之從無驗脈來滑以洪膈間飫欲嘔此痰火客於中宮於水谷混淆而作泄治以桔半蒼連燥濕清痰火諸藥而泄自止又一人卒倒無知六脈幾絶衆皆測以虛極逮細審則胃中大滿而且堅此由食物之傷氣閉不行所致急投破氣攻堅之藥頓覺脈復而神蘇舉若此者即從客不從主之調治脾胃法也何以謂之欲攻而先補如一人痞滿壅塞不能食在法似宜攻謂六脈皆衰形色瘁而不澤先用補中益氣湯五六劑俟其脈旺神強而後繼之消伐始克無虞又一人滯下初成勢難驟補見其手足厥冷脈數無倫而為無陽之虛極急煮參姜桂附等藥疊進之後覺脈有序而肢體溫始行通利而獲瘳如此之類皆欲攻先補之調治脾胃法也何以謂之欲補而先攻如一婦胎痢日久似宜從補不意腹中多滯而脈實尚在可攻不可補之候余即乘其可而攻之攻後痢即減隨進人參大補脾丸以培胎氣又一婦崩暈交發百藥不瘥其脈甚沉滑而腹中實且堅此食滯於脾脾虛氣弱崩暈無從施效耳施用滯丸導其滯崩暈頓止續與參苓散而痊如此之類皆欲補先攻之調治脾胃法也所謂補多而瀉少者邪已去而胃已清胸膈無膩凝之患飲啖漸可通耳補少而瀉多者邪雖去而胃未清胸膈尚多壅礙未便加餐耳舍湯就丸者胃虛有濕不敢恣投湯藥轉傷胃氣耳變丸為散者丸緩而散速使藥力易行而胃易清耳旦同夕異旦異夕同者因藏府殊途虛實交併一藥不能獨治耳勿藥而愈者服藥過多胃氣為藥所傷勿得更加攻補耳節飲而愈者飲聚胸中不能思食耳灼艾而愈者病根深固多藥必妨腸胃必藉火攻而後驗可臻耳專事適口之味而愈者胃氣久虛非味莫之起耳語云口滋味而百節飽亦養正邪自除之義耳雖然此但言其調治脾胃中之脾胃病有如此而五臟之中更有脾胃病之說又不可不察也東垣曰五臟生化之源在脾胃虛則五臟之邪不一而集如人右關脈緩而弱脾之本脈也食少肌虛噁心嘔吐嘈雜吞酸作瀉作腫脾胃之本病也而或兼見弦急弦長之脈與肋滿筋攣諸風掉眩寒熱往來諸證者乃肝之脾胃病也而或兼見洪數洪散之脈與煩燥肌熱口苦面紅怔忡驚惱盜汗自汗諸證者乃心之脾胃病也而或兼見浮短浮澀之脈與哮喘咳嗽喉癢咽疼皮膚皺裂諸證者乃肺之脾胃病也而或兼見沉微沉細之脈與足軟腰疼骨蒸盜汗遺溺遺精諸證者乃腎之脾胃病也又當各隨所兼脈證而調治之不可泥定脾胃之病只在脾胃之中而不博考周詳以知其遍旁證甚徹如頭眩耳鳴之用半夏白朮天麻湯脾弱經愆往來寒熱之用逍遙散者非即肝之脾胃病乎思慮傷脾以致怔忡驚悸之用歸脾湯食少肌虛不得寐之用辰砂遠志丸者非即心之脾胃病乎唾咯痰涎胸膈不利之用潤下丸二陳湯脾虛咳嗽之用保脾清肺丸者非即肺之脾胃病乎泄瀉之用四神丸脾虛之用八味丸水氣日久之用金匱腎氣丸者非即腎之脾胃病乎人自不察耳唯不察所以但知調治脾胃而不知調治脾胃有如此之微如此之費如此之難耳嗚呼如此之微如此之費如此之難有淺陋拘閡者所克窺其藩籬哉毋惑乎老生常談之不屑聞掩耳而走也吾因是而深有望焉烏乎望望天下同志之人無一不惕然於生死之關而猛然於脾胃淵源之學滿腔熱血吾道其幸乎蒼生其幸乎莫謂産後之熱無實熱而不知有寒涼也莫謂實熱之熱終實熱而不知有溫補也有一婦産僅五辰得發熱之候手揚足擲譫妄欲狂大渴思冷飲而脈數且洪余以産後氣血兩虧縱多熱證不可遽用寒藥止取生地黃為君當歸為臣柴胡玄參牡丹皮為佐炒黑乾薑為從治而兼引用更加童子小便以襄清熱之功宜其當矣不謂一飲猶是再飲猶是加人參一錢飲之亦猶是復細審脈加旺而諸證悉有餘確為實熱改用人參白虎及黃連解毒等湯五六劑並啖梨桔寒泉諸涼快之味而熱始解若執産後之熱無實熱其不失者幾希矣一少年子病傷寒始則身熱頭疼畏寒脈浮數醫從而汗之表已罷而傳及里不畏寒反畏熱躁喝狂譫不得臥六脈數而洪實熱無疑矣夫何以涼藥攻之而熱益以劇不只熱劇而脈亦益以數一息之間幾近八至且至熱之來局蹐不整一似趨不旋踵而時蹶者謂之陰證似陽可謂之陽證變陰亦可蓋由真氣之虛不克管束脈道而然此是不足之數非真有餘熱也即以人參三錢煎汁入童便一杯飲之脈勢漸退而熱亦少解更以人參麥冬五味煎飲數劑而愈若執傷寒傳裡之實熱為終實熱其不失者幾希矣噫可不慎哉或問富家之養子性柔脆而多疾貧家之養子每堅強而寡疴伊何說也裴子曰貧家有暗合養子之道與富家異耳何謂貧家有暗合養子之道與富家異蓋小兒受病有五一曰暖小兒質稟純陽而火偏勝保護無容過暖諺云若要小兒要受些飢與寒此有至理在禮曰童子不衣裘裳此其義也富家之子一出母胎即矇頭裹足燠室藏之加以覆衾垂幕稍長則未寒失寒疊加絨纊更日置之於火煉其未足之陰積熱請病從此變生而柔脆者多矣貧家之子則薄被單衣隨地而擲雖不無風冷交侵動人憫念而不知正得抑陽扶陰之至理與富家異其暗合養子之道一二曰飽人身腸胃以清虛為和順在小兒則尤要小兒腸胃柔窄受盛無多且不自知飢飽旋與旋啖而富有之家則又脂味充盈易恣情而多淡脾胃諸病從此變生今之縱口腹致病者不只小兒而柔脆者多矣貧家之子則無物可食即食亦自有常必不能使之厭飫在口腹固為清簡而不知正是腸胃清虛之至理與富家異其暗合養子之道二三曰怒小兒獨陽無陰性易躁而多怒惟抑怒可使全陰病人多易起怒而不知適所從益病也其原皆由於自幼縱性富家之子種種任性驕怒之習越於性情本無可怒怒無已時怒由肝木木旺生風風木乘脾驚癇諸病從此變生而柔脆者多矣貧家之子則素居窮蹇不縱其性自能貶損意氣無怒敢發處境似乎怫逆而不知正得抑怒全陰之至理與富家異其暗合養子之道三四曰遏號諺云兒號即兒歌老子云終日號而不啞則知兒之號出於不自如不自識莫或使然猶天籟也豈有遏之之理況小兒陽氣偏隆最多火病藉此呼號以泄之不為無益號呼泄氣即泄火氣有餘便是火而富家之父若母者反生不忍動以食慰而遏其號鬱滯諸病從此變生而柔脆者多矣貧家之子則聽其號呼而勿恤見者聞之以為心忍而不知正得順適天和之至理與富家異其暗合養子之道四五曰傷藥藥乃攻邪物非養生物也多服久服鮮有不致傷生者草根樹皮只以療病原不足以養生奈何有無病而喜服藥者富家之子則不論有病無病日餌無虛甚至旦暮更醫亂投湯劑而不知忌有謂無傷吾勿信也且藥之傷人甚於傷食食傷醫所易知藥傷醫多不識病外諸病從此變生又不止於柔脆矣貧家則不暇求醫無資取藥縱兒多疾安意守之在旁人以為失護而不知正得有病不服藥為中醫之至理富家皆當書一通於座右以為保赤之道與富家異其暗合養子之道五噫是豈富家不善養子乎非也境也因境以成其不善養子也是豈貧家善養子乎非也境也因境以成其善養子也常見延醫之家陳肴設禮固不啻事神事鬼之誠且敬也要皆出自不得已之苦心醫者於此自當設身處境深用不安適可則止莫謂分所宜然恣情長夜之飲而絶不一回念在暴病家尤不及覺若久病則中外主人俱已晨夕焦勞臥餐且廢復何以堪語云一人向隅滿堂為之不樂有病之家則不止一人向隅滿堂亦幾向隅矣一人豈能獨樂哉有仁心者必不然也更有一等嗜習而成僻者嗜博奕但知有博奕而不知有病人嗜呼盧但知有呼盧而不知有病人更有一等趨競公門奔馳世務之輩則又心無二用但知有趨競奔馳而不知有病人願同志者勿類是針灸諸病從未有以時令拘也而世俗則專泥於伏暑之月不思病之感也有淺有深其治療也有緩有急豈可概至伏暑之月而後針且灸耶考諸素問靈樞以及月令禁忌等書並不見有伏暑始宜針灸之說不知世俗何所據而云然但一歲之中最不可犯者獨在冬至左右旬餘日斯時尤宜瑾戒房事夏至前後亦然奈何反行針灸耶蓋此時正在剝極夏生陰盛陽微之候君子於此自宜深潛玩密保護微陽而不便有所泄易謂先王以至日閉關商旅不行後不省方素問謂蟄蟲周密君子居室去寒就溫無泄皮膚皆此義也當此之際則又不可遽執四時俱宜針灸之說賊及天和也何百齊曰運氣之說起於素問本為四時之變而設蓋以春為木夏為火秋為金冬為水夏秋之變為土以此察天地之氣候辨人物之病證以為治療之主耳素問六節臟象論謂五運相襲而皆治之終期之日周而復始又謂春勝長夏長夏勝冬冬勝夏夏勝秋秋勝春且以一期三百六十日分為六氣每氣主六十日則其意可見矣紀以天干則曰五運紀以地支則曰六氣其實一也傳久致訛至天元紀大論等篇則遂以年歲之支幹分管六氣蓋已失先聖之旨矣蓋年歲之干支天下皆同且通四時不變也天氣之溫暑寒涼民病之虛實衰旺東西南北之殊方春夏秋冬之異候豈有皆同之理此其妄誕蓋不待深論而可知也不可不知運氣不可徒泥運氣近世傷寒鈐法悉以得病日之干支為主其源亦出於此決不可用蓋五行之氣各主一時當時則為主氣為司天非其時而有其氣則為客氣與時正相反者則謂在泉為其氣伏於黃泉之下而不見也治療之法用熱遠熱用寒遠寒所謂必先歲氣勿伐天和者是也春時木氣司天則四方皆溫夏時火氣司天則四方皆熱夏秋之交土氣司天則四方皆濕秋則皆涼冬則皆寒民病往往固之但當因其四時寒熱燥濕之氣而治之可矣何必拘其年歲之支幹哉雖然此又論其病之常也有如此而至於病之變者並不可拘於四時寒熱與燥濕之氣也一人患嘈雜噁心吞酸吐嘔而兼頭眩耳鳴恍惚不寐延余視之診其脈則洪而滑右關尤甚曰此痰證也腹中時作飢飢即食食即太甚曰痰火作飢也不可與之太甚其家不信以為多食可以病愈夫食而致死者固多則在醫貪食而致死者不少責在己不知古人有言曰痰病數十日不吃亦不餓死何也蓋謂受痰之纍賴痰之養也縱或覺餓多是痰火致嘈必不得已須略與食萬勿多食後不見反復漸漸再進今半日間連與之數餐餐便縱恣安得不填塞胸中夾痰飲而發昏迷眩暈之候乎多食又未免食積作痰至不可救慎之慎之此後當宜痛改前轍加慎調理不數日必漸而安倘不改前轍仍不慎謹請勿復敢見矣夫虛勞證治余已盡詳三卷中矣更庸何贅唯是世之行醫而不善醫者但用養血滋陰之藥不知變通以夭人而勿恤深切痛悼不得不虜丹嘔血再為來者言之夫虛勞病未嘗非陰血虛也雖聖人復起亦未嘗不謂陰血虛也是則生熟地黃當歸知母玄參天麥門冬諸藥豈曰無功舉世遵而行之豈曰不可但此等之藥既寒涼又濡潤在脾胃未衰水穀未減之時用此治標則可若至多服久服未有不伐脾胃生化之源而為水穀減餐者矣多服久服漸至真水遏郁不能生脾土補腎不若補脾豫謂亦須加運行之藥素問曰血乃水穀之精生化於脾又曰脾為至陰人之陰虛乃脾虛也脾土一虛則生化之源竭何能運行水穀而成陰血乎本欲養血適以損血本欲滋陰適以損陰是無異與陰柔巽順之輩相朝夕似乎德我而溺情既久隱受其禍而不知矣女子小人甚矣不可近也然則治之將奈何惟於初起時急急早灸膏肓等穴為上策耳外此則絶房室息妄想戒惱怒節飲食起居以助火攻之不及一少怠焉脈旋數矣脈數則火有進而無退載血而上行矣鑠金而咳嗽矣蒸骨消肌汗泄不止動作皆衰矣縱有良工曷克為也語曰勞證之脈五至以外者不治又云當治於微病之初莫治於已病之後厥有旨哉至夫藥也一言可蔽王太僕所謂壯火之主似鎮陽光是也陰虛有二有陰中之水虛宜用六味等丸有陰中之大虛宜用八味等丸近且有用八味加參等料煎膏服而愈者陽光者火也水主者陰也陰不足則邪火熾故必壯其主以鎮之六味等丸其要藥也如人平日真陰素虧兼以不善調攝妄自作勞致陰血受傷陰虧則火旺火載血上行為衄為吐脈實者以生地黃為君丹皮桃仁茅根韭汁之類為佐甚者權以醋炒黑大黃去舊而生新此後急宜滋養陰血培補真元運旋脾胃如六味丸八味丸及歸脾湯等藥隨症用服照前項調理法庶病不滋蔓而效可漸收也珍攝為上第一戒色第二戒怒第三戒言若血大脫後不加珍攝必致陰日虧陽日旺遂成夜熱咳嗽盜汗勞倦等症病成而欲治之則亦難矣故勞症初起如日晡發熱飲食不減當用生地黃為君當歸知母鱉甲玄參銀柴胡牡丹皮地骨皮等藥為佐有汗加麥冬五味棗仁浮小麥若兼噁心無汗暫加軟柴胡葛根以透肌而解熱心火暴盛者少加川黃連尺脈強旺者少加炒黃柏以平其勢勢平則已不可過劑此先哲業有詳論惟謂苦寒之藥竟非虛勞者所宜也若咳嗽不止者法當清金潤肺紫苑款冬二冬二母枇杷葉之屬固所必需亦須以生地黃為君以滋腎而生陰蓋癆嗽之因因於腎陰虧敗不能制火火無所畏亢而刑金金極則鳴耳徒事於肺是執流而忘源矣如瓊玉膏集靈膏太平膏天地膏三才膏俱可選用前項諸藥先後所治規則雖不能有外乎此但滋陰之藥難期速效必致多服多服則傷脾減食如前之所云有必然者故進滋養藥者時時當以飲食進退為消息毋得經年纍月恣投而勿顧也邪火盛則真火衰真火衰不能生土而食減但著飲食減少咳嗽熾盛急須加溫補脾胃兼行氣清金等藥有司命之責者其可專執而不知變通哉曷言乎用藥之如用兵也裴子曰蓋衛國者兵衛生者藥藥不以法而夭折因之兵不以律而敗亡隨之慎所同耳且以信仁義智勇與夫決敵致勝之策一比勘焉則又不爽錙銖者何也可戰則哉不猶醫之可攻則攻乎可守則守不猶醫之不可漫汗下乎可和則和不猶醫之用和解乎宇宙大文章不可多得以醫目裴子失矣兵有設伏醫有從治均之伏其所惡誘其所好也兵有哨探醫有消息均之欲窺其虛實也兵有間諜醫有轉藥均之欲離其動邪也先補後攻得非足食而後足兵之謂乎先攻後補得非大兵之後瘡痍荊棘即為撫綏之策乎攻補交施得非且戰且屯且和之計乎大積大聚殺其大半而止得非殲厥巨魁脅從罔治之義乎病去而勿妄加攻補得非窮寇勿追歸師勿掩之說首不當補而補齎盜糧養寇兵也不當攻而攻嘉兵者不祥也或以正或以奇以授兵尾其後或先鋒鋭其始與醫之正治奇治先後劑輕重法何異焉且無恆者不可以作醫兵之貴信也無活人心者不可以作醫兵之貴仁也醫不可以執方兵之貴智也醫不可以貪利兵之貴義也急攻之急下之急補之兵之貴勇也器械不精以其卒豫敵也藥品可不精製乎部伍不整以其將豫敵也立方可不嚴整乎君不擇將者敗醫不可不擇也閫外不專者敗醫不可以不任也忿兵者敗驕兵者敗印刓忍豫者敗醫獨可忿可驕可吝否也病在此而治在彼無過之地妄加斬伐也有是病而用是藥王師所至勿犯秋毫也使裴子而登壇必能料敵制勝指揮如意斷非徒讀父書者執一不通趙括之讀書也一治有五孫子之用兵也有一二味成一方者武穆之以寡御衆也有一二十味成一方者淮陰之多多益善也有半劑或一劑而愈者武之西伐會朝清明也有數十劑或百劑而愈者周之東征三年始得也以至於占風象度地勢察人心與醫之審地宜先歲氣望聞問切均不可以岐視者用藥與用兵同有如此雖然兵家之虛者則示之以實實者則示之以虛與醫之虛者實之實者虛之其理相似而兵家之虛者示之以虛實者未之以實尤為制勝之妙算論至此始全而醫家之虛者虛之實者實之則敗不旋踵何也兵家之所謂虛者兵食不足也在我之無氣虛也所謂實者兵食足也在我之無氣實也此論發人未發醫家之所謂虛者元氣虛也所謂實者邪氣實也邪氣者譬之兵家之敵人非在我者也此其所以異也用藥與用兵之不同又如此今之不知醫者固不知如用兵之說知如用兵之說者亦但曰醫之不可輕用耳孰知醫之與兵有同異一至於此也故曰善將兵者而後可以語醫識虛實者而後可以語醫有客過余而問之曰一大病久虛人容顏黃瘁飲食減餐兩足浮腫已半歲氣虛下陷無疑矣連進補中益氣湯反致脅滿胸膨嘔噦不能食則奈何余曰據子所言是誠氣虛下陷之病矣補中益氣湯亦誠對病之藥矣服之而病反劇者徒遵章句中所謂不足者補下陷者升耳不思古人立教言有盡而意無盡雖言不足者補而不足之中未始不兼有餘病於此而溫補焉則不足者未補而有餘者日必熾矣喚醒多少雖言下陷者升而清氣下陷者未必絶無濁氣之在上於此而漫升焉則清氣未升而濁氣已先橫矣子之所用升補而反劇者大率近是客曰何以知其不足中之有餘清氣上之濁氣耶曰有證之見於外而知之耳夫證之見於外者如噁心膨滿痰嗽喉疼腹痛作瀉與飲食有妨之類是也此即所謂有餘之病兼在上之濁氣也外補之法便須酌量而施之真是無隱不照裴子胸中有秦鏡然此乃見證之顯者至有證雖見而實隱卻又難察也本不噁心而胸中則時懊惱本不膨脹而肋間隱然刺痛本不痰嗽喉疼而喉忽似哽似噎本不作痛作瀉而大便不時至欲解不解本不有妨飲食而亦自有厭飫而難安履霜堅冰至慎之不可不早也如此之病亦即有餘之病兼在上之濁氣也升補之藥須酌量而施也酌量二字須從症不從方非用心精而晰理密者不能也故用補中益氣湯必熟審之當而察之詳者為得焉耳或問尹真人謂人身祖竅真際舉世鮮知者果安在耶曰祖竅之真際即老氏所謂玄牝之門也玄之又玄衆妙之門天地萬物皆從此出可一言而盡也悟真篇云要得穀神長不死須憑玄牝立根基故紫陽修煉金丹全在玄牝一竅玄牝一竅採取在此交媾在此烹煉在此沐浴在此溫養在此結胎在此即脫胎神化亦無不在此修真之士誠能知此一竊則金丹之道無遺義矣所謂得其一萬事畢也但從來聖聖相傳悉有虛名而無實據如曰先天主人萬象主宰太極之蒂混沌之根至善之地凝結之所虛無之谷造化之源不二法門甚深法界歸根竅覆命關中黃宮希夷府總持門極樂國虛空藏西南鄉戊已門真一處黃婆舍守一爐淨土西方中黃正位這個神室真土黃庭種種虛名總是言此一竅此一竅者非心非腎非肺非肝非脾非胃非臍輪非尾閭非明堂泥丸非關元氣海非兩腎中間一穴非臍下一寸三分不可以方所執形相求聲臭逐唯取生身受氣之初而已矣生身受氣之初即父母交感時一點先天混沌無形之氣挾精而入子宮者是也是即吾儒之所謂無極而太極也交感之後而此氣為精血所包則又太極而兩儀矣由是而生臟腑生官竅四肢百骸以至能知能覺能運動能屈伸能喜怒哀樂能仁義禮智能神聖文武都從受氣初之一點中出來者耳玄牝之門乃自有焉故老氏曰玄牝之門是天地根夫玄牝之門而曰是天地根則吾身天地之根固吾身玄牝之門矣然吾身玄牝之所從出者又何根也又必有先玄與牝以為根而後能分玄與牝夫分玄與牝者太極也先玄與牝者無極也無極者吾身之中也即堯舜允執之中孔子時中之中釋迦空中之中老子守中之中也不止吾人一身之內有此中即一身之外遍滿天地亦皆吾身之中也正所謂周流六虛之外而無不足退藏一身之內而非有餘也萬物皆備故曰一竅能納太虛然則此一竅之真際果安在耶道藏經曰天之極上處距地之極下處相去各八萬四千里而天地之相接適當四萬二千里之際人身一小天地心臍相去八寸四分而人身天地之相接適當四寸二分之際劈破天荒但恐竅不可守此際想不在乾之下坤之上震之西兌之東無在而實無不在無不在而實無所在也雖然竅非徒竅有妙存焉妙者何昔人有言竅是中而妙是一若知竅而不知妙猶知中而不知一蓋一生乎中有中定有一一即執一之一一貫之一歸一之一守一之一執一者以其中之一而執之也一貫者以其中之一而貫之也歸一者以其中之一而歸之也守一者以其中之一而守之也伏羲氏之河圖而虛其中者先天也乃吾身祖竅之中也此未發之中所謂元神是也即孔子謂先天而天勿違老子謂無名天地之始釋氏謂茫乎無朕一片太虛道家謂一點靈光露出端倪神禹氏之洛書而實其中者後天也吾身租竅之一也此已發之和所謂元氣是也即孔子謂後天而奉天時老子謂有名萬物之母也夫河圖中矣中而未始不一洛書一矣一而未始不中中不離乎一一不離乎中豈非無為之神機精微之妙道與故曰多言數窮不如守中丹書萬卷不如守一修身至要在乎守中抱一而已守中者守此祖竅之中也抱一者抱此祖竅之一也蒙莊所謂南海之倏北海之忽口遇於混飩之鄉也修身之士不明此竅則真息不住而神化無基大丹不結須知此竅是個性命根原無形相無方所無聲臭不可以有心守不可以無心求有心守之則著相無心求之則落空先師或曰空洞無涯是玄竅知而不守是工夫斯得之矣語鶴李子云不知易者不可與言醫易中太極無極陰陽之理即吾人性命之根也
