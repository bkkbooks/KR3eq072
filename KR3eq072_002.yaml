body:
  text: 卷之二何柏齋先生水腫論曰造化生物水火而已矣不可使之偏勝太旱物不生火偏盛也太潦物亦不生水偏盛也水火和平則物生矣人之飲食運化於脾胃實系水火二氣非脾胃所能也火盛則脾胃燥水盛則脾胃濕皆不能化物水腫之病蓋系水盛而火不能化也火衰則不能化水故水之入於脾胃皆滲入血脈皮肉而為腫此自然之理也導其水水氣少減復補其火使二氣和平則病去矣余每讀此論未嘗不嘆何先生之窮理也而又未嘗不嘆何先生之不甚窮理也何也造化生物之水火與脾胃運化之水火是人與物所自有也非外來者也旱潦之水火與作腫作燥之水火非人與物所自有也是外來者也外來者可見之水火也養人物者也自有者不可見之水火也生人物者也揭出生養二字天機泄漏盡矣先生之所謂火腫之水乃可見之水也邪水也所謂火衰之火乃不可見之火也真火也真火邪水絶非對體之物先生以之對待而言將認水腫之水為真水乎邪水乎將認火衰之火為邪火乎真火乎抑認作腫作燥之水火邪正之誤昭如日月之明即脾胃運化之水火乎非脾胃運化之水火乎邪正罔明客主無辨先生不認賊為子必認子為賊矣嗚乎先生胡為作此論也以昔人治水有補火之一説耳不思補火之説即虛則補母之説也其意蓋曰水腫之病系脾虛不能運化脾虛不能運化系火衰不能生土法當補真火於脾土之中則土旺而水有所畏不為腫矣是知補火者補火以生土也明補火之本旨非補火以勝水也先生乃謂火衰則不能化水水氣少減復補其火使二氣和平則病去豈理也哉余敢以火衰則下添入脾虛兩字使二氣平和五字直刪去於義始圓爾辨詞理之未安雖然治水亦不一法矣有補脾而愈者有瀉氣而愈者有針刺而愈者有祛風清熱毒而愈者有開鬼門潔淨府而愈者有解瘡瘍逐痰飲消陳積與行瘀血而愈者豈補火一説足盡法之變乎既云補火則熱藥矣熱藥則附子肉桂乾薑矣設遇乾咳吐血聲啞咽疼骨蒸盜汗與夫鬱熱內實之人而兼水腫之病豈可遽執補火一説而以熱藥投乎計治例之難執又豈補脾瀉氣針刺祛風清熱諸法可悉置勿何乎執其一廢其百吾知其誤人也多參主宇泰謂先生醫學未精論水火則從所未發噫柏齋先生儒者也雖不精醫安足病宇泰先生儒而精醫者也不克補偏救弊而猶深取其説誠可惜也夫誠可惜也失四十年前之人雖多服久服當歸地黃門冬知母等濕潤之藥不見有傷脾之患今時之人則不必多服久服而食減胸膨肌浮腸滑之證旋接踵焉噫噫是豈養血滋陰之法僅可行於四千年之前而不可行於四十年之後耶非也世風衰而真元薄也雞豚牛羊之餘食蔬者有幾瓜梨橘藕之餘食粟者有幾醇漿乳酪之餘食羹者有幾其助則薑杜椒蒔其和則油鹽醯醬常而煎炒燒炙異而脯臘膾慘醉酢蒸酥與凡百巧為滋味以佐長夜之豪觴富貴之家斯已濫矣市井之輩靡有止焉且也義命之理茫然怨慕之心橫起趨利趨名視昔孰冷而孰熱患得患失視昔孰淡而孰濃世故紛擾晨昏競出酬應之間視昔孰勞而孰逸至有素風為礪恬退自分之人則又世網彌天人情叵測而憂思驚怖之懷更不知其孰多而孰少也如是而欲求脾胃元氣之不薄於今日則戛戛乎難之矣而謂當歸地黃門冬知母等濕潤之藥可瓷投而勿顧乎或曰養血滋陰之藥世皆用之以補虛勞不足者也子且謂有傷脾之患而大補脾丸中反多耗氣之藥則何如曰此深有當乎脾胃元氣本然之妙而人不知也夫脾胃元氣本然之妙乾乾不息者也其所以能乾乾不息者果何物乎晝夜循環於臟腑肢骸官竅間若天行之健而未始或停也丹溪所謂脾具坤靜之德而有乾健之運是也古稱脾胃為都市都市者四方商賈去來則貨聚散之大市也必旋來旋去旋聚旋散乃為天下生化之源若來而不去聚而不散何生化之有此方妙合此旨然亦須得加減法濕盛加蒼朮便結加當歸有寒去黃連加益智乾薑庶無偏弊故此方雖用人參白朮補氣為君而又以滲濕消痰之茯苓半夏為臣更以開滯疏壅之枳實山楂陳皮厚朴木香砂仁黃連神麯穀芽為佐使名為大補而實無有所謂大補之藥唯使腸胃通調胸膈和利能飲能啖不失其常降濁升清時靡有間旋推以陳旋致以新助彼乾乾不息之妙而已矣雖無所謂大補之藥而大補之理實具焉以故每施脾胃氣衰之人為脹為腫為痞為痰為久瘧久痢與高年百損産後諸虛而不克加餐等病屢獲奇徵不然則山楂枳實厚朴陳皮等藥耗元氣者也曷有補於人哉夫既曰為脹為腫為痞為痰為瘧為痢為高年百損與産後諸虛是不一其病矣不一其病則亦當不一其治子乃以一大補脾丸而通治之抑又何也曰天下事從綱則簡而易得從目則賾而難求理之必然也不善為治者從病之目從目則脹以脹治腫以腫治痞以痞治痰以痰治瘧痢以瘧痢治高年與産後亦以高年産後治治不勝治靡知統宗矣善為治者從病之綱從綱則唯知有脾胃而已矣知有脾胃則條目有彼綱領在我而脹者腫者痞者痰者瘧者痢者高年百損與産後諸虛者皆可勿問矣何也脾胃者化水穀而生元氣者也元氣主則自能運行其滯而脹者寬痞者平矣自能運行其濕而痰者消腫者退痢亦可止矣又自能運行其營衛以充養乎形軀則高年無百損而産後無諸虛矣素問曰知其要者一言而終不知其要流散無窮不可不深察也先哲有言曰脾胃氣衰諸病未有若參苓白朮散之多驗噫信斯言也則參苓白朮散亦可謂大補脾丸矣何不以此治脾胃氣衰諸病而必用有消導藥之大補脾丸哉曰參苓白朮散者治無邪氣之脾胃之衰者也大補脾丸者治有邪氣在脾胃氣衰者也二語可醒從來夢夢有邪氣之脾氣衰者不足而兼有餘也故不得不寓攻於補又不得不寓補於攻寓補於攻則補而不滯雖補亦可藉以為攻又申言大補脾丸妙用寓攻於補則攻而不峻雖攻又未嘗不因以為補也二方雖同其旨而實不同其用若據執脾胃元氣不足不顧所夾有餘之邪而唯事補是益有餘而損不足必致脹者愈脹痞者愈痞痢者愈痢瘧者愈瘧而脾胃之元氣亦益以傷敗不能食且飲而死已不但誤天下人盡視人參白朮為鴆毒而不敢用並誤學者將脾胃元氣之旨等之辨髦而凡遇似有餘實不足之侯亦寧俟其死而勿救矣流弊易有極哉救世深心復何以加一宦者以積勞後間發往來之熱浸至形神枯稿懶於動止水穀日損不知味纍越月矣諸醫皆作脾虛治而用補中湯歸脾湯參苓散及大補脾丸等藥未嘗非也而究皆罔效余視之六脈澀且濡兩尺特甚曰此固脾虛病也然不直脾虛病也乃腎虛之脾虛病也之字大可參治當於兩腎中培化原之本則脾始充而病斯已矣若徒事於末安效之臻遂屏諸藥以紫河車一具為君熟地黃二兩為臣杜仲山茱萸破故紙山藥芡實各一兩茯苓益智縮砂青鹽各八錢為佐使制每如法即以河車地黃二味酒煮搗丸如桐子命名河車補脾丸俾服之能識河車補脾者幾人不逾月而形氣飲啖俱如初病旋已或叩而問其故曰無他虛則補其母爾或乃顧余大聲曰子誤矣脾屬土火能生土欲補其母則當補心於腎何與曰心但屬火非即火也火乃人身之元陽與坎水互藏於兩腎脾土生化之原悉根於此乃真母也此豫所以不補心而補腎也夫既補火而不用桂附乾薑等熱藥者獨何與素問曰壯火食氣少火生氣桂附乾薑乃壯火食氣之品虛寒甚者則可用今此病未至虛寒之甚故僅取河車故紙益智茱萸等少火之品以補之爾夫既補火而又兼補水之藥者獨何與噫子但知火能生土而不知水亦能生土脾坤土也為離火所生胃艮土也又為坎水所生子如不信請觀卦位坤土何以居離火之次而艮土又何以居坎水之次耶是則人參白朮乃補脾勝藥獨置之勿用者又何與曰此方以腎氣虛而脾無所稟急欲下達以固腎而救脾讀至此始識裴子用方不苟故不但用辛能潤腎之縮砂為嚮導而又加咸能下降之青鹽為直入之兵毫不敢雜他藏藥以分其勢遽加參術則參術乃脾家藥勢必顧戀乎中州不能無遲遲失前之弊急欲入腎以培土而加餐謂將能乎或始為之唯唯久病後不可恣投以藥且無論藥之謬即對病者亦不可不慎何也人之元氣以胃氣為本胃氣又以穀氣為本久病之人與穀氣久疏則所喜者食物所惡者藥物理之自然也此際正當以食物投所好以養胃氣胃氣旺則元氣亦旺不補之中有至補者在噫斯理也實至理也哀哉夢夢者天下皆是何用此怫意之物妨礙胃氣耶素問曰得谷者生失谷者死未嘗曰得藥者生失藥者死也矧藥之攻疾猶刑罰之除殘食之養生猶德教之治平也疾已而猶藥之不幾於刑罰治平同類而用耶今之醫者不明此理每遇病久乍痊必謂氣血兩虛還須大補其藥不外當歸地黃枸杞故紙山藥蓯蓉參耆苓術等類不煎則丸恣投無憚有服之而飲食反減者有服之而作瀉作嘔與腫滿者病後好補者鑑之甚至膈脹不能食而反生他證者名為補人而實害人病蓋有從口吻而死者矣亦有絶其谷而視其死者焉世都不察幽潛沉冤者衆矣念及此深為酸鼻夫飲食養生物也可節而不可縱然亦不可使之絶故節之則生不節而縱且絶則死縱而死病者之責矣絶而視其死伊誰之責耶如傷寒傷風傷食等有餘之病或脹或痛或嘔或吐感之暴而脈躁疾有力旦無虛怔之兼者雖不與之食亦可也此不可與而不與是節之非絶之也及久病久虛久不飲食之人陡覺穀氣馨香欲求啖而不敢遽啖正胃氣將回之侯委委曲曲布出許多活人要訣大是苦心法當徐投漿粥或少與適口不助邪之物以充胃氣胃氣充則元氣亦充而病自無不愈若概視飲食為毒藥而不與是絶之非節之也則幾微之胃氣將安恃乎一士人年近五十因勞病暑身熱煩躁醫為傷寒輒表之遂汗多不止氣短神疲口大渴脈細疾而無倫按之甚弱余曰寒傷形為有餘禍根在此一汗暑傷氣為不足六脈虛疾暑證明矣急宜先保元氣用人參二錢麥冬三錢五味子十粒煎服次日脈證俱減再以前湯合四君子與之二劑後進粥碗許繼而漸倍亦可謂安穀者昌矣甫越宿汗復大出手足冷至肘膝脈微且數禍根發矣按之如無曰虛極矣汗多亡陽所致耳急煎參耆各五錢桂附歸術各二錢日再進脈證仍爾奈何余颯然悟曰藥之取效必賴胃氣之運化胃氣虛雖對證之藥咸歸罔效計必得適口之味以充胃氣參耆自然得力隨詢喜羊肉食否病者疑異不敢諾曰肉者胃之藥也羊肉補氣與參耆同功參耆不能補明是胃虛以肉充之胃氣自強強則運化參耆而湊效矣即取羊肉酒煮成糜與之食食已煎前藥投之立驗或曰子真好奇大病後水穀且不敢輕進況於羊肉不死幸矣曰古人業有人參羊肉湯大培虛損豫乃效之特分用耳何奇之有中庸之道或默默陰證俗論必歸房勞又必歸傷寒而不及雜病且專責男子而不及婦人小兒殊為可怪開千古俗人之謎夫陰證即虛寒證亦即亡陽證也男女老幼雜病傷寒皆可犯何見而必歸之房欲耶如産婦亡血及崩漏過多又如卒然大吐血不止與霍亂吐瀉無度有因汗吐下太過及為寒涼藥所傷或暑月恣意追涼冬月忍飢勞倦為寒所中凡此之類皆能令人元氣暴脫忽變為手足厥冷體疲無氣脈微欲絶與房欲脫陽之證狀無纖毫異凡可犯陰寒之證者匯歸無遺學者須沉心理會方有得而治法總不外人參附子肉桂乾薑救之急則生緩則死同歸一轍矣可岐而二之哉通乎此則陰證未嘗不犯於有欲之人而無欲之人之證亦未可遽謂必不犯此也從未有發敢爾僭及一人咽喉痛不能飲食時作時止者半歲吹喉藥消痰降火藥草汁藥咸罔效豫診得兩寸洪大而虛尺部沉而無力兩足喜暖畏寒口喜冷飲甫下咽旋越出此腎火虛而亢上下真寒上假熱也斷不可用寒冷反治之藥法當從其性而伏之隨處六味丸料加肉桂附子炒黑乾薑水煎入青鹽少許為嚮導冷而與之三劑旋愈或問熱藥冷飲何以解曰上焦是假熱下焦是真寒以真熱之藥冷與之則下咽之初暫得冷藥以自快漸達下焦熱性始發從其窟宅而招之同氣相求火下降矣即韓氏假對假真對真之義也亦即素問寒因熱用熱因寒用之義也嗚呼甚有陰盛格陽而為面紅口渴煩躁喘咳發狂之證誤認有餘之熱以寒涼之藥進而斃者吾不知其幾矣六氣之理如權衡然既燥則不濕既濕則不燥易有所謂流濕潤燥並行不悖耶曰流濕與潤燥非兩事所重只在流濕一邊蓋燥本乎濕流濕便可潤燥非既流其濕又潤其燥也如一人瘧久不已發時必燥渴恣飲更嘔噦胸膨而面黃瘁此濕盛為原之候也醫不審日以補中湯加知母門冬烏梅花粉等類治之益劇余以蒼朮三兩半夏茯苓澤瀉厚朴陳皮砂仁黃連各五錢作丸俾服每二錢日再進旬余而安噫嘻服潤劑而渴彌增服燥藥而渴反止其故何也流濕以潤燥也凡久瘧之人必多黃涎惡水聚天中宮中宮濕甚則生熱熱甚則生燥所以作渴而多飲是燥本於熱熱本於濕流其濕則熱不生熱不生而燥自潤矣遽用滋潤之藥以止渴適所以助其濕助其濕有不愈助其燥乎理甚易明前賢不我欺耳藥品如熟附子牛膽制南星瓜蒂人中白牛黃蘇合香與急用應病丸散等務必平時預蓄以應不時之需苟為不蓄而欲蘇死更生於旦夕之間恐軒岐復起亦不得展其奇矣醫家之蓄藥與國家之蓄人才其重同爾煎製藥餌務必得人得法不則雖與證對無效矣嘗見治藥之家法曰酒漬者水代之法曰炮炙者生用之或烈火速干而真液未出或真液沸溢而別入茶湯又如藥材爛惡銚器腥汙水類不潔與他物及土塵之雜者尤為不少如是而欲勉強圖功不亦難乎雖然此僅害之細故耳甚有仇姦之子嫉妒之徒潛布挑生之術而為禍大不可言者可不慎乎可不謹乎醫者勿以其人之病輕淺而易視易視則輕者必變而為重甚至不可救者有矣凡有治療勿論病之大小皆須盡心力以期萬全無使滋蔓難圖而遺人以夭殃也傳曰履霜堅冰至以言乎漸是謹也視以為難難斯易忽以為易易斯難能漸是謹者雖有非常之臨可坐而定已不則勢雖微易有極焉病到危急時非峻重之藥不能救百中之一二今之醫者皆重惜名譽姑以輕平之劑冀其偶中幸而不死而曰是我之功不幸而死則曰非我之罪恐真心救世者不應如此也真心救世者必慨然以死生為己任當寒即寒當熱即熱當補即補當攻即攻不可逡巡畏縮而用不寒不熱不補不攻如諺所不治病不損命之藥嗟嗟即不治病欲不損命有是理乎倘於此認不的確不妨闕疑以待高明慎勿嘗試以圖僥幸庶不負仁者之初心君子不強其所不能醫之道極難知無學者不知有學者未便知無才者不知有才者未便知有才有學矣不克隨時取中者亦不知甚矣知醫者之難也今有一等人謾説某某知醫某某不知醫噫知醫固難而知知醫者恐亦不得容易也醫有上工中工下工上工者良工中工者庸工下工者謬工蓋謂庸工之不若良工謬工之不若庸工也以理言之豈止不若良工哉並不若謬工耳謬工之殺人殺人而見其迹者也見其迹則人所易知而易遠其為天下之害少庸工之殺人殺人而不見其迹者也不見其迹則人所易忽而易近其為天下之害多譬猶暴君為不善其亡雖速而天下之害不甚深庸君未必能為大不善而天下之元氣陰受其賊而不知其亡雖緩而為害於天下不既深乎嗚呼庸君誤天下庸醫誤病人一理也醫到病家未診視不可先講病必待望而聞問而切脈證詳明始可斷為是寒是熱是實是虛病在某經當於某經用藥某日當瘥某日當危庶藥與證對而不蹈妄投之弊近有急欲見長者未見病人顏色輒抵掌而談曰某藥可以治某病此必某病也當以某藥治之噫是猶未命題而先作文以待矣鮮有不背聖經而誤人命者醫者胸中預擬一成見不得雖病者不為自諱詳告諄諄亦未可遽執為真病情真病本也且待診視後參較果否耳至若侍奉者之傳言延醫者之預達尤不足憑蓋學者胸懷空曠了無執著始得應變無方耳先哲云凡讀書不可先看注解且將本文反復詳味待自家有心得卻以注解參較庶義理昭然不為他説所蔽若先被其説橫吾胸中自家竟無心得矣吾於醫學亦云或問癆瘵痰嗽治以二冬二母款花紫苑之屬十九不效者何也曰癆瘵痰嗽非肺病也原於先天腎陰虧敗不能制火火無所畏亢而刑金金極則鳴耳此謂水泛為痰之嗽非風痰熱痰痰飲痰涎作嗽者比法當峻補腎中真陰及佐味鹹下降之藥徐徐引之歸元始善所謂病在上而治反在下也若泥肺病以冀近功是從末而遺本矣然則補陰下降之物其孰為優唯童便一味為上藥爾童便味鹹性溫溫可養元咸則歸腎速而能引火下實人身中之氣血藥也用治本元虧損之病則同氣有情而易入較效於偏性之草根木皮甚遠褚氏謂服寒涼百不一生飲搜溺百不一餐良以此也雖然苟非病者真心怕死於微病之時便能節飲食絶嗜欲慎起居息妄想忘日忘年內觀靜養以佐藥餌之不迫亦未見其能治也一人年三十餘積勞而多欲遂夜熱兼旬無盜汗六脈近數飲食不減此癆證之微而未深者也正與養血滋陰治法甚相合藥用生地黃三錢鱉甲醋炙二錢知母當歸柴胡牡丹皮山茱萸各一錢黃芩六分煎服六劑而熱平隨灸百勞一穴膏肓二穴以杜其根更以河車丸與之調理不百日形氣飲食脈侯俱如初而愈如胃氣不足者先灸中脘氣海二穴以保先後天元氣使飲食不減真氣不衰更易調理葛可久曰癆證最為難治當治於微病之時莫治於已病之後今此病正當微發之時故能取效於旦夕間耳若忽於微而不早為之治未有不浸至於咳聲嘶肌消腸滑食減臥床脈來細數而挽之無從者矣患此者不可不防微而杜漸也一婦頭眩耳鳴肉瞤筋惕恍惚不得寐乍作乍止半載矣後乃阻經四月小腹如懷子醫者疑其妊而安之忽一日下紫黑血少許始識經閉改用通經藥數劑腹不減反增噁心嘔噦粥飲下咽旋越出咽喉焦痛舌黑無津衆醫不能解余診得六脈弦細而滑兩關尤甚曰此頑痰閉滯血海壅瘀月事乃阻耳有把握何以徵之其脈細而滑者痰脈也頭眩耳鳴恍惚者痰證也嘔吐不食者痰客中焦也舌黑無津咽喉焦痛者痰生熱而然也素問謂治病必求其本今病本於痰必以治痰為首務遂投礞石滾痰丸八十丸不動再投七十丸小腹微痛次白又服如數小腹痛不可忍將夜半下如豬肝四五塊每幾盈尺更下如破絮脂膜者無計又纍纍若石榴子紅白攢綴邊絡而下者不啻二三斗小腹頓平痛亦如失其最異吐痰碗許俱如緑草汁色口角流涎忽變如琴絃之堅因憶丹溪先生謂怪病是痰十居八九良然良然時胸次未平飲食少進用橘紅茯苓各一錢枳實黃連半夏曲各八分水煎入薑汁二匙竹瀝半酒杯二劑後以六君子湯加獺更服加味潤下丸調理逾百日乃愈逾年生一子有病傷寒傳裡熱結不通者已屢經下而腹中按之則仍繞臍堅結若仰瓦然且其人伏枕不起又纍旬肌肉盡爍湯飲幾廢甚至氣怯不足以布息當此之際攻補不能施其巧計將安出曰論常法在所必攻不攻則腸胃無繇清水穀無繇進元氣無繇復而人易以生若遽攻則此立稿之形垂絶之氣能堪之乎計必先行補法亦有先攻後補者是在臨機消息而後察邪正之緩急輕重以攻之攻後旋覆從補補後旋覆從攻而又旋覆從補則庶幾耳但補與攻皆當以漸而毋驟其始也且以小劑生脈散加陳皮煎飲半小甌飲後移時無反復復少與繼則或可漸倍並商攻法也曰小劑曰半小甌曰少與何等慎重非深得仲景心者曷克臻此如腹中鬱熱未清渴欲冷飲遂當啖以橘藕瓜梨之屬潤其喉吻飲食久疏胃必弱甚又當間與焦米湯大棗湯或扁豆筍蔽萊蔔暨飴糖等湯隨所好以蘇胃氣凡此皆余平時所謂適口不助邪之物佐藥餌以不及者也皆補法也補既得方可議攻則唯玄明粉一味為佳生何首烏煎服亦佳蜜導膽導尤為良法不應須詳脈之虛實氣盛衰邪之深淺以導滯丸或小承氣加當歸微下之下後仍須照管元氣毋徑前而勿顧其有虛虛也唯恐傷人肚腸倘其侯果可授餐亦勿得驟之以濃厚先以焦米煎汁飲之次煮熟梨熟棗熟萊蔔等少與之無忤始可徐投漿粥與他物耳須知此證腹中攻不克盡與旁流者恆多唯期脈靜身涼口不渴老到便可圖進水穀慎勿過攻俟其水穀融液腸胃充盈不攻亦可自去若必欲去盡而後與之食不將速其死乎雖然此皆陽證之攻補法也亦有元氣內損之病治療失宜損中復損內雖熱結外則手足未冷而鼻先寒六脈沉遲或虛疾無倫次則又是陽證變陰之侯急當以桂附參薑酌微甚而溫補之又不可與瓜梨橘藕承氣玄明粉同日而語治者矣陽證變陰者甚衆庸醫不曉此理每以誤人良可嘆也智者於此不可不熟審而通其變噫嘻豈特傷寒為然哉凡雜病日久鮮有不犯此證者余於治按中每詳言之矣一婦年五十許傷寒旬越不得汗其家欲取其汗肩戶塞牖垂幕多衾以劫之病者煩躁悶亂譫妄欲狂熱極矣急延余治甫入臥室便熱穢熏蒸不可近速令開窗啓幕揭去所覆者大半病者始揚手呻吟有喜涼畏熱狀徵其面則赤舌則焦燥有胎詢喜冷水飲否此水攻法病者不能言唯頷之遂與新汲水一大碗飲盡不食頃輒戰栗須臾通身大汗而解或問辛溫發散藥服十餘劑不能取汗涓滴飲以水汗反大出其故何也曰是即水火既濟之義也譬火燃金枯以水沃之氣液沸騰必然之理又何疑焉衆皆聳然自失無病服藥之流弊久矣而今為甚此皆執前人服藥於未病與上工治未病之説而謬焉者也不知服藥於未病者即致治於未亂保邦於未危也善致治者尊賢使能振綱肅紀則政修民和苞桑萬世在茲矣若無故興師則內生反側外兆邊塵不反自貽伊戚哉然則保國保身無二理用藥用兵無二術善衛生者能於平時節飲食慎起居少嗜欲寡縈慮使五官安職百體清和將遊華胥而躋齊松矣苟思患預防審醫可也問藥性可也讀岐黃書可也若以草木偏攻則寒者戕賊脾元熱者煎熬血脈是猶小人陰柔巽順似乎有德而國家元氣鮮不為之潛移者古人謂壁中用柱壁中添鼠不可不深長思也至若不治已病治未病則又是有説如肝邪旺恐傳變於脾當先瀉肝以平之心邪旺恐傳變於肺當先瀉心以平之之類是也是則治未病者治病之未傳也非治人之未病也服藥於未病者調攝於朱病也非未病而先服藥也無病服藥者讀之能猛醒不二説各有所指皆非無病服藥之謂也夫何貪生者假為棲真玄牝之丹縱欲者泥為嬰兒奼女之術岐黃浩戒視若辨髦伐性斧斤恬如衽席是以疴端呈現種種乘張蒂固根深卒難期效而猶咎刀圭無補毋乃愚乎本草謂上品藥為君主養命中品為臣藥養性下品藥為佐使主治病者特言其性之剛柔耳非內經君臣佐使之旨也王節齋曰主治者為君輔治者為臣與君相反而相助者為佐引諸藥達於病所者為使如治寒以熱則熱藥君也凡溫熱之藥皆輔君者也臣也然恐熱之太過也少加涼藥為監製使不致有偏熱之虞者佐也至臟腑經絡受病之處又須各加引導之藥而使之入此則所謂使也若遵本草之悅則發表之麻黃攻裡之大黃獨不可以君耶且性與命亦豈藥力之所能及耶王節齋曰畏畏其制我不得自縱惡惡其異我不能自如此二者不深害蓋彼既畏我我必惡之我既惡彼彼亦畏我我雖惡彼彼無忿心彼雖畏我我能制彼如牛黃惡龍骨而龍骨得牛黃變良黃耆畏防風而黃耆得防風其功愈大之類是也至相反則兩仇不共共必為害然大毒之病又須大毒之藥以劫之甘草芫花相反藥也而蓮心飲以之治癆瘵黎蘆細辛相反藥也而二陳湯以之吐風痰又四物湯加人參五靈脂以消血塊感應丸以巴豆牽牛同劑為攻堅破積之需相反之中亦有相成之妙此古人達至理於規矩準繩之外故用之反以為神非好奇之私而以人命為僥幸也一高年紳患怔忡不得臥且兼嘈雜噁心不知味三證其脈數而滑右關特甚此濕痰凝礙中州使然是胃病非心病也衆醫不識咸謂心血不足而用當歸地黃人參五味遠志門冬酸棗仁之類治之反致目眩頭旋見粒輒嘔余以半夏四錢為君蒼朮茯苓砂仁黃連橘紅澤瀉各八分為佐使二劑而安繼以此方加白朮人參竹瀝薑汁作丸與之服浹旬全愈或曰怔忡一證獨無心血不足者乎曰心血不足之怔忡絶不有嘈雜噁心不知味等證兼之者今有之信非其為心病矣然則其不得臣者何病耶曰素問謂胃不和則臥不安亦胃病也驚悸恍惚恐怖及怔忡不得臥諸證同出而異名者也不可疑其證之異而治亦與之俱異也一商年近五旬諸證咸集而於怔忡則尤甚遠近名家大半以為心血不足余則有謂膽氣弱者有謂心腎不交者又有謂痰客胞絡以致神舍不清者其所用之藥則皆不外當歸地黃人參五味黃連麥冬菖蒲遠志天麻膽星茯神酸棗以及琥珀牛黃丹砂龍齒之屬逡巡數年日以增劇甚至煩躁靡寧不餐不寢者逾月余診之脈來數且洪而右關益以滑此胃中有火有痰之明驗也先投小胃丹五十丸胸中便有旋轉勢而神情亦稍安即以鐵鏽水一碗煎半夏一錢橘紅茯苓枳實黃連人參白豆仁各一錢服之遂得安枕通宵並索食焉繼制礞石滾痰丸日服三十餘顆未兼旬而大便續去痰積無汁頓使病者氣清神爽百苦盡脫快不可言後以艾火灼其腹之中脘巨闕以絶生痰生火之源更以大補脾丸倍加參木以保胃中元氣證雖有異而治未嘗有以異也但此病由於七情抑鬱心志不克舒伸而得終非醫藥所能療必也中懷坦若不能既往之得失興廢戀其心庶不更作商亦頗是有見家事悉付妻兒新置一婢遣之出嫁日同二三知己飲酒豪遊忘年忘日逍遙於世外之天三十年來不唯病不更作抑身年雖壽而不衰昔一犯腰痛者衆以為腎虛而用杜仲山萸當歸續斷故紙地黃之類久而彌甚乃就質於余余細察之則知其病在胃中耳何也其飲食減少時發噁心嘔吐者非胃中有濕有痰之候乎且其痛臥重而行輕每臥欲起則腰胯重墜不能轉側必將此身徐徐擺動始克強起而行逮行則又漸覺舒和矣認得透此蓋濕痰之乘氣靜而蹈於腰胯之間故作痛乘氣動而流散於腰胯之外乃得舒和耳若果腎虛則臥而逸痛必當輕行而勞痛必當重抑何是之反歟更透初與小胃丹五十粒連下宿水四五行繼以二陳湯去甘草加蒼朮澤瀉砂仁三劑痛勢頓減隨與蒼朮為君之大補脾丸服未旬余痛即如失余臨症施治必用自家主意不敢遽因病人之所告與傍人之所傳為實據蓋病自有真非傍人所能知並非病人可得言其詳也余鄰人一少年偶肆淫於妓者家歸來自以為損也乃叨餐厚味以補之次日即發熱頭疼畏寒不得汗余視之病者全不以自諱實告於余欲余作陰證治不意診其脈浮數而不虛且語言動止皆壯厲而有力並不見有所損之侯是雖犯淫實陽證也酌與羌活沖和湯一劑病者自負知醫疑而勿服更一醫年已老而亦頗有名可無誤矣乃謾不加察輒從病者之所告古稱老醫非老年乃老到耳以參薑桂附等藥誤投之曾未之夕即躁擾狂越遍體紅斑九竅流血而卒至於死一農家子年甚壯又形偉而氣強忽患身熱病遣其兄延余治余未往先囑之曰我弟無他病只連日醉飲更大嚼羊肉麵食與新米飯耳須得大消導藥乃可療余竊謂知弟莫若兄且傷食又農家常習言雖未確或亦近之及往視有主意則大不然六脈洪數而虛極頭不疼腹不悶言語輕微而更懶於動止此內傷元氣之虛熱非有餘病也連進補中益氣湯十餘劑參耆加至四五錢兼以肉食等味而調補之月逾始愈嗚呼信兄言也則為弟者必含在而歸泉矣即此推之而謂傍人之言可據乎病者之言可據乎酒之為人利也御霧疏風祛寒敵暑快氣舒脾聚歡消悶其為害也腐腸爛胃潰髓蒸筋傷神損壽僨事招尤利則當歸功於酒害則當歸過於人世之蒙害於酒者未有不歸過於酒嗚呼酒固未嘗害人人自害於酒耳胡勿思之甚也民非水火不生活何嘗有害於人然亦不能無蹈水火而死者遂歸過於水火可乎世皆以飲量過人者稱為善飲酒噫善之一字豈僅飲之過人者遂足當其稱乎非也謂善得酒中之味而飲之不失其宜也或值花朝或當月夕或遇天寒或為雨悶或撫今追昔或即景興懷或肢體愆和或神思冷淡或與故人聚首或與知己談心或與韻士高人論詩論文論世外事隨境之可借酒娛情於此而能多飲者固謂之善飲酒不能多飲者亦謂之善飲酒即涓滴不飲而酒致酒情不多讓於過人之量者亦未嘗不謂之善飲酒也若處以無節無厭日日沉酣之輩而稱之曰善飲酒竊恐未當酒後偶及敢請政之善飲酒者張本斯五湖漫聞有云余于都太僕坐中見一張翁年一百十三歲普福寺見王瀛洲年一百三十歲毛間翁一百三歲楊南峰八十九歲沉石田八十四歲吳白樓八十五歲毛礪庵八十二歲俱精敏不衰升降如儀問其頤養皆不飲酒即如文衡山施東岡葉如岩動靜皆與壯年不異亦是俱不飲酒者可見酒之不可沉湎推蓬寤語云人生類以眠臥為晏息飲食為頤養不知眠臥最不可嗜飲食最不可多飲食過多則陽氣抑塞嗜臥過多則神氣暗消將以養生適以殘生君子夙興夜寐常使清明在躬淡味少食常使中懷舒泰素問有所謂用寒遠寒用熱遠熱之説者論無病之常也所謂不遠寒不遠熱之説者論無病之變也今之人但知其常不知其變時當夏令不論有病無病概不敢用桂附乾薑以犯司氣之熱時當冬令亦不論有病無病概不敢用石膏芩連以犯司氣之寒竟不思天令雖熱而受病在寒即桂附乾薑亦所勿忌烏得因其天令之熱而遠之天令雖寒而受病在熱即石膏芩連亦所勿忌烏得因其天令之寒而遠之須知寒熱之藥乃治寒熱之病在人身者耳非治天之寒熱也舍時從證自然之理滋陰養血之藥豫固未嘗廢也世俗則謂我廢而不用不既冤乎唯是世之季也虧敗脾元者十人而九故不敢謾用濕潤之藥以眉既敗之脾元耳東垣先生有知己矣豈概廢而不用哉試舉一二最明白最顯理者以例之則世之謂我廢而不用者自迎刃而解矣如産後諸病夫人而知其為陰血虛也倘其人兼有胸腹不利飲食少餐或噁心或嘔吐或作瀉作脹而為産後之脾胃病者豈可據以血藥投之乎虛癆諸證亦夫人而知其為陰血虛也倘其人兼有胸腹不利飲食少餐或噁心或嘔吐或作瀉作脹而為虛癆之脾胃病者豈可據以血藥投之乎腸風下血血藥亦所必需也而或兼有脾胃諸證者豈可便以血藥止之而不思更有所以治之乎崩漏下血血藥亦所必需也而或兼有脾胃諸證者豈可便以血藥止之而不思更有所以治之乎世間類是者甚衆故豫不敢妄用血藥以誤人非真廢而不用也總之脾虛不能攝血歸元不可仍作血病治或問補中益氣湯凡為虛證者服之無不驗唯施於癆瘵骨蒸之人病必增劇果何謂哉曰此方乃東垣先生為內傷勞倦而生虛熱者設也夫內傷勞倦而生虛熱者陽氣虛也參耆甘草專補陽氣之虛故用之無不驗也佐以升麻柴胡者因其氣之下陷也所謂治氣者主陽而升也至若癆瘵骨蒸之人是陰血虛也陰血虛者法當用地黃當歸玄參知母鱉甲門冬沙參牡丹皮銀柴胡以及秋石童便之類補其陰而降下之也所謂治血者主陰而降也處用溫補升提之藥是助陽矣助陽則耗陰血矣病有不致增劇者幾希陰虛陽虛判然有別昔南人有言曰人而無恆不可以作巫醫朱子竟認巫醫為兩事一注以交鬼神一注以寄生死岐而二之恐為未當夫醫之道始於神農闡於黃帝著有素問內經以救民疾苦所謂墳典之書至尊至貴莫之與並豈可與巫覡之徒同日而語哉但醫有不同名稱亦是有別精於醫者曰明醫善於醫者曰良醫壽君保相者曰國醫粗工褊淺學未精深者曰庸醫但有時運造化者曰時醫至若擊鼓舞趨祈禳疾病不以醫藥為事者則謂之巫醫耳世之稱為端公太保夜行卜士北方稱為師婆皆此也正南人謂之巫醫也蓋謂一切虛誕之輩亦是不可無恆也醫統云世之行醫者有一要訣不必博群書明道理只須略讀難經脈訣抄些經驗成方此外唯整修醫具周匝世情奔走豪門結歡僕隸廣賂巫卜遍囑姑婆能如是則到處彰名彰譽謂有不行者天下鮮矣又須老著麵皮不顧慚恥口口異傳接命神丹談及富家巨室不親是親不族是族不相知是至相知肆大其誇駭他碌碌庸庸之輩自然假可作真耳可當目偶而僥效竟冒其功設也誤傷委命無怨矣縱有識者洞見肺肝亦只任他笑議錢財我自得之耳何必孜孜為學徒自勞苦哉嗚呼醫日流於弊也至此矣無怪乎有道者之鄙賤矣欲求得一真醫亦已難矣時流行狀描寫無遺不知裴子亦蹈此弊否近有一等行醫者偶得一方一藥輒滿顏矜色抵掌傲笑而言曰我藥能救人之命噫命果何物而可醫藥救之也哉即古昔大聖至神靈至慈愛亦不過能以藥治人之病未聞有救人之命者今且無論不能救人之命即欲求其能治人之病者亦不多見矣豫雖不敏誦讀於斯者有年博採於斯者有年忘食廢寢默契神參以至歷危際險者又有年亦僅知探虛實測淺深權緩急能治人之病還其不死而已豈遂因以為功而曰我藥能救人之命哉從未之敢也謙德宋張子綱神醫也居鄭州刑部尚書慕容彥逢為母夫人病召子綱於鄭至則死矣時方暑月將就木子綱欲入視彥逢不忍意其欲求錢乃曰道路之費當悉奉償實不煩視子綱曰傷寒法有死一晝夜而復生者何借一視彥逢不得已延入子綱揭帛注視呼仵匠語之曰曾見夏月死者面色赤乎曰無然則汗不出而厥爾識力一至於此不死也幸無急斂趨出取藥命急煮灌之戒曰善守至夜半大瀉則活矣子綱舍於外館至夜半忽聞病者腹中勃勃聲遺穢物鬥許而蘇舉家驚喜遂叩呼子綱子綱曰吾體倦莫能起然亦不必起盼日方可進藥也遲明徑命駕歸鄭彥逢詣其室但留平胃散一貼而已其母服之數日良愈蓋子綱以彥逢有求錢之疑故不告而去老到一至於此後紹興王秬叔遇子綱問之曰公之術古所謂十全者是歟曰未也僅能七八爾吾長子病診脈審證察色皆為熱品概一至如此命煮承氣湯將飲復疑以至再四勢必飲矣一似有掣吾肘者姑持杯以待兒忽發顫悸復綿衾至四五始稍定汗出如洗明日愈使吾藥入口則死矣安得謂之十全哉嗚呼子綱往矣豫且未暇高其才高其識獨是品概絶倫大可畏服千秋而下願為執鞭因志之以自勵虛心一至於此膏粱之人與藜藿之人處境固是不同而形質亦大有別凡有治療斷不可同病而拘一例而藥也如皆外感病也而膏粱之人不可太發散皆停滯病也而藜藿之人不可太消導皆有火有熱病也而膏粱之人不可太寒涼一或過當則元氣必致有傷虛證立見多死少生矣正猶柔脆之物不克勝任風霜故也世間有一種太陽之人有一種太陰之人太陽之人雖當冬會身不須綿口常飲水色欲無度大便數日一行芩連知柏大黃芒硝恬不知怪太阻之人雖在暑月不離復衣食飲稍涼便覺腹痛泄瀉參朮薑桂時不絶口一有欲事則呻吟不已此兩等人各稟陰陽之一偏者也與之談醫各執其性之一偏而目為全體嘗試而謾為之雖與之言必不見信其為誤也可勝道哉趙養葵曰冬至一陽生夏至一陰生此二至最為緊要至者極也陰極生陽絶處逢生自無而有陽極生陰從有而無陽變陰化之不同也若春分秋分不過從其中平分之耳然其尤重者獨在冬至易曰先生以至日閉關閉關二字須看得廣月令云是月齋戒掩身以待陰陽之所定則不止關市之門矣又曰冬至一陽生當漸溫暖何為臘月大寒冰雪反盛夏至一陰生當漸清涼何為三伏溽暑酷熱反熾曰此將來者進成功者退隱微之際未易以明也蓋陽復於下逼陰於上井水蒸而堅冰至也陰盛於下逼陽於上井水寒而雷電合也凡病面紅口渴煩躁喘咳者誰不知是火盛之極抑亦自有腎中陰寒所逼而然者豈可概用寒涼之藥害人生命乎何柏齋先生曰劉河間論三消之證皆由濕寒之陰氣極衰燥熱之陽氣太盛所致玉機微義深取其説且謂治此疾者補腎水陰寒之虛瀉心火陽熱之實則病自己復斥世論以暖藥補腎之誤不知世論大是有理特詞不足以發之耳蓋腎主元陽元陽之火盛則能升腎藏之水使津液上行從未有發以制心火而為既濟元陽之火衰則腎藏之水不升水之入於腸胃者皆從其降下之性而不升散故心火無制熾盛而作渴此蓋水火未濟而未可遽謂濕寒之陰氣極衰也若謂補其腎水陰寒之虛便可止渴則水固陰寒之物也渴者飲水不絶何以不能補其陰寒之虛而止其渴耶其論之非明矣透快驚人世論用暖藥補腎使腎水上升以制心火不為無見但消渴之證必燥熱之陽氣有所鬱結而成若不求而去之輒用暖藥補腎則藥病扞格暖藥未得收補腎之功而先用助邪之害則消渴愈甚又不可不慮也法當用涼藥食後服之以清其上更用暖藥空心服之以培其下權其輕重緩急而施治之庶無偏弊耳世傳有渴病誤飲躁絲湯而止者蓋緣絲湯所煮者蠶繭也蠶性極熱煮而為湯澄冷而飲之則熱性歸下而不扞格故能升腎水以制心火而止其渴格理精微所謂熱因寒用者也世人雖知有此治而未能明其旨茲故及之朱丹溪先生曰西北之地多風寒故患外感者居多東南之地本卑濕故患濕熱者恆衆蓋北方高阜天不足西北而多風東南卑下地不滿東南而多濕方土之侯各有不齊所生之病多隨土著醫者必須因時處治隨地判宜治北人之病宜以攻伐外邪為多治南方之疾宜以保養內氣為本何也西北氣厚飲食倍常居室儉素元氣不戕一有疾病輒用疏利其病如脫若夫東南體質柔脆腠理不密飲食色欲與西北迥別概用疏利不幾於操刀殺人耶雖然西北固厚安能人人皆實南方雖薄安得人人皆虛必觀其人因證而藥斯無一偏之弊耳王節齋先生曰或問今人有言東垣之法宜用於北丹溪之法可行於南如何曰東垣北醫也羅謙甫傳其法以聞於江浙丹溪南醫也劉宗厚世其學以鳴於陝西果如其言則本草內經皆神農黃帝岐伯之説亦止宜施於北方耶夫五方所生異病及治之異宜內經異法方宜五常政大論已詳言之矣又如北方多寒南方多熱江閩多濕嶺粵多瘴謂其得此氣多故亦多生此病非謂北病無熱南疾無寒也至於治寒以熱治熱以寒則五方皆同豈有南北之異耶又曰或問人言東南氣熱可服寒藥西北氣寒須服溫藥然今東南之俗胡椒薑桂人常食之不見生病而北京士大夫畏食胡椒辛熱之物何也曰東南雖熱然地卑多濕辛熱食藥亦能劫濕西北雖寒然地高多燥辛熱食藥卻能助燥故耳用藥者宜識此意
