body:
  text: 卷之一人之生有所以生而非形也所以生三字是此書一大宗旨耳目鼻舌手足與臟腑經絡骨肉皮毛皆形也非生也從形說到生從生說到所以生絕無影響非坐破蒲團者不能其各有所司以供不窮之用者亦生也而非所以生所以生者何曰命命果何物謂有物焉而無形謂無形焉而又非無物也命之門安在曰腎有二生於脊骨十四椎下兩旁後天之有形也先天之無形則寓乎兩腎之間而為後天有形之用後天有形者兩腎也人之兩腎其猶果殼諸實之兩歧乎歧端無中生出萌芽即先天無形之妙先天無形者水火也水與火互藏其間而為命之門也曰水得火而涸火得水而熄勢不兩立安能互藏曰後天之水火有形而先天者無形有形者相剋而無形者相生試思太極未分原只一氣自一氣而分為水火火即水所從出水即火所由生二者交合變化雖二體而實為一體雖二用而共為一用故造化於此不息鬼神於此不遺也人身一太極也當父母媾精未有形象先結河車中間透起一莖莖端一點如蓮蕊初生而水火二氣已交合變化於其中而為生身立命之根矣由此二點兩旁生出兩腎形如豇豆相併而交函於水火之外以象圖之不宛然一太極乎次而生心生肺生脾肝與百骸九竅而形備形既備則氣之溫者即火也溫而不至熱火中有水也氣之涼者即水也涼而不至冷水中有火也水中有火其精不竭火中有水其明不熄因是而耳之聰目之明鼻舌之臭味手足之持行水穀之蒸為血液而充臟腑榮經絡灌溉乎骨肉皮毛將生生於不窮苟水自水火自火陰獨陽孤而化源息矣安望其能聰能明能臭味能持行而臟腑官骸不盡屬死灰稿木也哉故曰人之生有所以生而非形也究言之命亦名耳天地之秘聖人無從指聖人所以罕言命也其實不得已而強名之耳昔伏羲氏仰觀俯察近取遠求不能多語只信手一畫一畫者命之源也亦即水火之源也先乎天而無始後乎天而無終者也至謂左腎為腎右腎為命門又謂男子以右腎為命門女子以左腎為命門甚謂兩腎總號為命門噫命之門固在腎夫腎豈即命邪苟能於有形之中求無形之意則思過半矣自天地而人物莫不從伏羲所演之一畫中流出其一畫以前果何景象曰一畫前之景象即吾心之景象也識吾心景象者幾何人識吾心之景象則一面以前可反觀而默識矣昔伏羲慧徹天根欲悉吾心之妙無可擬其端倪不得不借此以啟後人謂其有景象不可也謂其無景象亦不可也是故聖賢遞相垂教各因意立名而無實無可名不得不因意立名如曰乾曰元曰天曰命曰善曰仁曰理與道曰不二與空與無及精一執中而一貫而明德而性而誠以至浩然之氣玄牝之門天地之始無極而太極皆虛名也無一而非千聖相傳不二法門描寫一畫前之景象也亦無一而非描寫吾心之景象也且觀天地間時之行物之生其所以行所以生者何鳶之飛魚之躍其所以飛所以躍者何至於人之視聽言動喜怒哀樂其所以視所以聽所以言動而喜怒哀樂者何蓋有物焉先乎無形無生無飛無躍無視聽無言動無喜怒哀樂而為有行有生有飛有躍有視聽有言動有喜怒哀樂之主耳知此則時行非時行物生非物生鳶飛非鳶飛魚躍非魚躍而視聽言動喜怒哀樂亦非人之所能矣又何疑乎一畫前之景象乎是在善悟者神領之言語形容不得也形容盡矣還說形容不得須知伏羲自無畫而化有畫自一畫而化千畫究也千畫還歸一畫一畫還歸無畫也已素問謂七節之傍中有小心從之有福逆之有咎正與周子太極圖說無異但周子統天地人物言此則專指人身言耳其曰七節者脊骨之自下數上第七節也傍有兩腎而中間則有一小心小心者即太極圖中之白圈也潛藏於兩腎而為一身之太極也以其無可睹無可聞互微互隱名之曰小非真小也從之有福逆之有咎即君子修之吉而小人悖之凶也釋者不察而以上焦之包絡為小心則失之遠矣曰心在胸中而子獨言在腎顛倒拂常則曷以解曰在胸中者後天有形之心也其感通不窮之用雖從此出而其以為感通不窮之用者則寂然不動而藏於兩腎之中也夫寂然不動而藏於兩腎之中先天無形之心也無形者必托於有形而後見而有形者又必賴無形而始靈智者當悟無於有不可因有而遂溺於有也世之言心者唯知有形而已矣間有以為無形者亦唯知起滅乎胸中而已矣烏知夫兩腎中間是其棲息之宮府也邪曰心既無形則無可在而亦無不可在矣安見其在下而不在上也曰獨不見天地之心乎冬至子之半一陽復於至陰之下其復於至陰之下者即天地之心也象之所謂雷在地中也與吾心寂然不動時無以異也至其云蒸雨施以發交通之妙則天地之心又恍乎其在上矣象之所謂雷在天上也與吾心感而遂通時無以異也以天地之心證吾人之心則吾人之心在下而不在上也明甚此余所以揭太極之微而直指其歸元之路冀世之學者皆識本來之所在而求之庶性有所見德有所明道有所貫而精神魂魄意亦有所寧一而深潛大則可以臻賢詣聖小則可以卻病延年耳豈故為怪誕不經之說而惑世以欺人哉惜終身繇之而不知者眾與語之而不入也問朱丹溪何柏齋兩先生君相二火論孰是而孰非歟曰皆似是而非者也火乃造化之元陽一而已矣曷君相之可分哉其所以有君相之分者即一火之體用而分之也豈既有君火而又有所謂相火邪夫君火者即相火之本體也潛藏於天地之間雖具熱性而不發實為造化之根蒂猶王者深居九重無為而治故君名焉君相義透甚相火者即君火之發用也流行於天地之間以布生生之化於不窮者也正與宰相奉君行命同其義故相名焉非有二也丹溪柏齋兩先生之論則不然丹溪曰陽動而變而生水火木金土夫曰陽者君火也其動而變即相火也凡五行之物皆所繇生也先生所謂天非此火不能生物人非此火不能有生者正此義也大哉言乎永開聾聵二火之旨亦既詳且盡何復以君火為人火以相火為龍火雷火邪龍火雷火即相火流行之徵兆乃生木之火也人火即人間烹飪之火乃木生之火也豈相火且生木而君火反為木所生邪相火既為生木之火則不出於木明矣而下文又有出於木之說其謂之何柏齋先生欲救其弊以君相合一為辨功其溥矣惜乎以天氣人氣明白顯現為熱之相火反名君火以藏而不發動之君火反名相火不已失乎且曰在天藏於木之中在人藏於精血之中在人藏於精血之中則似矣在天藏於木之中將安解乎豈造化之元陽僅藏於一木之中乎是欲救其弊而適以踵其弊矣予逆推之則知兩先生之誤皆執素問五運六氣之中有君相二火耳不知君相二火雖列於五運六氣而五運六氣之推遷實爵二火宰制於太虛之中乃能始風木而終寒水也譬猶乾卦之中列於眾卦之中而眾卦未有不統乎乾元之陽而能帝乎震齊乎巽以致勞乎坎而成言乎民者也是則五運即火之五運六氣即火之六氣而兩先生不求其旨唯知一風木二君火三相火之說遂謂二火皆生於木所以遺晦於今而未明耳數十年晦蝕之旨自此炳如日星須知君火者寂然不動之火也未發也誠也相火者感而遂通之火也已發也幾也故曰君火即相火之本體而相火即君火之發用非有二也至五行之火是其所從出者也烏得以君相名之管見如斯更望政於後之君子陽虛氣虛陰虛血虛自各有別不思者以為氣屬陽氣虛便是陽虛血屬陰血虛便是陰虛噫何謬哉夫陰陽謂水火潛藏於兩腎而為人身之先天血氣謂營衛滋生於脾胃而為人身之後天故血虛者營虛也四物湯主之氣虛者衛虛也四君子湯主之陰虛者水虛也治宜補血藥中加知柏等味及補陰丸之類陽虛者火虛也治宜補氣藥中加桂附等味及理中湯之類其有別也蓋如此或曰以子言之則古人謂氣屬陽血屬陰之義何居余曰屬猶根也以根字訓屬字妙言氣根於陽血根於陰也血根於陰則血不即陰而出於陰所謂陰中之陽是也氣根於陽則氣不即陽而出於陽所謂陽中之陰是也是則血虛為陰中之陽虛陰虛之微者也陰虛為陰中之陰虛血虛之甚者也氣虛為陽中之陰虛陽虛之微者也陽虛為陽中之陽虛氣虛之甚者也故東垣先生於補中益氣湯有曰氣虛之甚者加附子以行參耆之功虞天民曰血脫補氣血虛者須參耆補之若真陰虛極而為勞瘵者參耆不可驟用繇此觀之得非有氣虛又有陽虛有血虛又有陰虛之別乎夫何謾不加察而執四君子湯以語人曰此補氣藥也勿論氣虛陽虛混之而施執四物湯以語人曰此補血藥也勿論血虛陰虛雜焉以進有不背聖經而戕民命者恐未之前聞試即二湯之旨言之亦各有陰陽互濟之理在如氣用四君子湯而人參白朮則是氣中之陽藥茯苓甘草則是氣中之陰藥矣血用四物湯而當歸川芎則是血中之陽藥地黃芍藥則是血中之陰藥矣以故血弱有寒禁服地黃芍藥陰虛吐衄禁服當歸川芎氣虛下陷茯苓不可多用氣虛火盛人參不可頓加氣虛嘔吐不宜甘草氣虛喘嗽不宜白朮一湯之中亦各有陰陽順逆之理可謂氣虛便是陽虛血虛便是陰虛而謾然施療乎人之一身無非病也亦無非藥泥金石草木鳥獸蟲魚為藥偏矣亦後矣飢飽待時飲食藥也寒溫適所衣服藥也動靜有常起居藥也色不視邪則目明聲不聽淫則耳聰口無莠言行無顛步則口體正均藥也使有人焉知填精而不知寡欲知養氣而不知守默知保神而不知絕慮亦焉往而得藥素問醫之六經也但言順四時少嗜欲節飲食不為邪氣凌犯初未嘗以藥言其五志為病者即以五志為藥如曰悲勝怒病怒者悽愴哀苦以感之喜勝悲病悲者謔浪佚豫以娛之恐勝喜病喜者迫遽危亡以怖之怒勝思病思者汙辱欺妄以激之思勝恐病恐者沉疑搜剔以緩之至如逸可治勞靜可治躁處陰以避暑就燠以避寒凡此之類皆非熱非寒非酸非苦無煩採製不費㕮咀隨在而得之之聖藥遠逾草根木皮萬萬也則請為尊生者揭未病之藥素問曰不能治其虛何問其餘夫不曰補其虛而曰治其虛大有深義治字補字難易大不相侔從未有發治字之義者補其虛者只有虛而別無邪氣夾虛中譬猶弱國時也治其虛者不足之中兼有餘之證譬國勢強弱相半時也此時而欲補之則邪未衰欲瀉之則氣已敗勢介兩難必隨時取中於其間隨時取中便難或先攻後補或先補後攻或因攻為補或借補為攻雖攻而正不戕雖補而邪不熾方可謂之治其虛謂之能治其虛耳於此不能其餘何可復問旨哉須知治之一字有無限苦心無窮妙用在與虛則補之之一字大有間世都忽而不察特註明之醫何以仁術稱仁即天之理生之原通物我於無間也醫以活人為心視人之病猶已之病凡有求治當不啻救焚拯溺風雨寒暑勿避遠近晨夜勿拘貴賤貧富好惡親疏勿問果如是心便可與天地爭上下矣竊恐能言而行不能即其病不可治亦須竭心力以圖萬一之可生是則此心便可徹天地統萬物大公無我而幾於聖矣不如是安得謂之醫而以仁術稱醫者嘗須愛養自家精力愛己即所以愛人精力不足則倦倦生厭厭生躁厭躁相乘則審脈辨證處方皆苟率而無誠意矣思欲救死全生庸可期乎今之醫者鮮克不以奔競為專務徒勞苦而不自知大戒也醫之看病與文家之相題無二病題也脈題之旨也取喻極切藥則詞章也方法局與勢也善為治者脈證既詳當思所以治之之法而隨因法以立方藥不過如卑賤之職唯吾方法驅使耳不思者竟以草木為拘見頭痛便用川芎見腳痛便加牛膝救頭救腳茫乎其無統宗雖藥品精良亦何能中病之窾會哉是猶文家不以題旨局勢為先而僅修詞章之未縱言言綿繡字字琳琅與本題將千里隔矣何足貴胃為水穀之海脾為生化之源生化旺則氣血清和諸病屏息生化衰則氣血虧損百病交侵非細故也唯東垣先生深得其旨闡發脾胃元氣之妙可謂呼聾震啟聵光矣世之醫者徒執病形不推病本脾胃之義置而勿講如脾虛氣短似痰喘耳泥為肺熱痰壅瀉以石膏蘇子脾虛發熱似外感耳認作風寒外束表以羌活麻黃脾虛下陷變為後重裡急猶謂滯積不行時流通病下以硝黃枳樸脾虛不運變為水脹中滿猶謂宿食未化導以巴豆牽牛產後脾虛飲食停滯而嘔吐脹悶誤擬敗血攻心恣餌桃仁四物勞瘵脾虛飲食減少而噁心溏瀉尚執滋陰降火偏需知柏二冬投之不愈更恣投之脾胃轉傷而疾轉篤技窮莫措歸命於數時弊如斯易可勝計無他未明主氣之說故也主氣實而攻之則病易愈主氣虛而攻之則病反加非藥不能治病也主氣不行藥力也況當世之人氣稟寢薄兼多沉湎於酒耽縱於色汲汲沽名皇皇求利又復傷於勞思者更不少也司命者其可不亟講於斯補虛之最切要者在扶胃氣扶胃氣乃補虛之要前文已頗偏裴子慮人不查又復審言婆心胃氣強則飲食進飲食進則氣血生補何如之所謂得谷者生失谷者死理甚易明耳今之不善補虛者概用當歸地黃人參白朮甘草黃耆等類太熱矣以為補虛之法莫此若矣不思此等品類雖能補虛要旨甜膩壅膈之性胃之強者則幸矣胃之弱者其可當乎不脹則瀉不瀉則嘔吐而不能食矣有謂病不轉加於此誰其信之病有以藥傷而變重者甚有變證莫識而卒致危亡者不可不知不可不慎此恆理耳病家不知醫家亦不知無怪夭枉者之多也昔一婦患經閉服血藥過多血不行而飲食反減又增寒熱嘔逆醫猶為瘀血攻心倍加峻削病者忽發神昏齒噤口角流誕狀類中風診其脈伏而微心下按之滿急且有聲曰此飲證也詢之乃為藥所傷非湧法不可急取油鵝翎探之一湧而出酸水四五升隨醒先用燥濕寬中藥次與補脾健胃俟飲啖起居如故始進通經丸血乃行一人病瘧兼旬胸滿而畏食胃氣不清故也胃氣不清漫用補中益氣湯可笑醫不審與以加減補中益氣湯二服瘧反大劇易用鱉甲何首烏等藥作大劑以截之更脹漚不勝湯飲俱廢或疑其誤服補藥與陳皮萊菔等湯病益加真可笑予診之六脈濡弱此濕氣滿胸膈也以蒼朮為君佐半夏厚朴澤瀉豆仁等少加薑汁食鹽徐徐與之不食頃嘰然欲吐即探引得吐黃涎惡水甚多得力在此一吐傷藥症狀描寫無遺學者須細心理會方得有見始平虐亦漸止又一小兒甫三歲得心腹痛疾醫者處劑太重煎汁又濃更灌之乳食後反增嘔逆發寒熱而兼喘更數醫咸罔效漸變昏聵不省人事其家以為不可救遂勿藥以俟之自晨至昏忽聞腹中淚淚聲上下者數四遺穢汁鬥許而蘇凡此等病患者甚多不能悉舉總之人身以胃氣為本胃氣傷雖對病之藥皆不能運化而起效真救性命之言反生他證今之病家醫家均不之察凡有病輒投以藥不愈更醫以藥旋已旋藥甚至病久脾虛飲食不進不思顧其生化之源而猶亂投湯劑致中氣受傷變證百出而死者不少矣可不慎歟丹溪先生謂產後大補氣血為主以產後血氣大虛不可大消導大發散大寒涼至犯虛虛之戒耳又云雖有雜病以未治之則不能無疑焉何也如血凝腹痛食滯胸膨或噁心或泄瀉或外感風寒等類產後或亦不免此皆不足中有餘之候遽可以大補為主而末治之乎以理揆之則此二語恐亦非出于丹溪先生之筆傳寫日久魚魯之訛未可知也余敢以如字易雖字權字易末字於義始圓高明者以為何如藥無所謂王霸也用藥亦無所謂王霸也而有王道霸道之喻亦用之者之有王霸耳用藥者常變以審時經權以濟事當補即補當攻即攻當寒即寒當熱即熱曷王霸之有分哉用之者善甘草參耆王也附子硝黃亦王也春生秋殺之天道也當即無藥非王也用之不善則附子硝黃霸也甘草參耆亦未始非霸也冬燠夏寒之愆咎也不當即無藥非霸也是則王霸不在藥而在所用亦不在於用而在善用與不善用今世之談醫者咸以參耆甘草類能補益稱為王道硝黃附子類能攻伐稱為霸道是泥於藥之有王霸矣泥藥之有王霸遂泥於用之亦有王霸矣噫果用藥有王道霸道之歧哉此唯可與知者言也藥有偶中而病愈者有誤中而病愈者未可居功於不窺當猛然省翻然悔惶悚無地則學日長而識日高昔如一木匠趙與一鐵匠杜行此乞宿其家有病人不納杜紿曰此趙君世醫家也蒙上司見召失路至此必病者之當愈也主人遂延入診之曰一藥可愈潛出得牛糞一塊牛屎有殺蟲之功偶中天也作三十粒下以溫水胸中頓覺如蟲行一湧而出小蜣螂狀者二三升病如脫越宿禮錢而去嗚呼此二人小人也欲苟一宵之寢以穢物治人蓋偶中耳竊恐二人此去必且謂醫學無難而居然一世醫家天下居之不疑者豈止此二小人哉幾不自識其初心矣又有一病身冷而脈沉伏者醫認為陰投以桂附等熱藥一婢煎之適傾廢茫無以應借黃連香薷飲一杯代之不謂一飲而瘥是何也陽證似陰非陰也醫誤以為陰也設藥不為婢誤醫之誤不可言矣大堪鼓掌設藥不為醫誤婢之誤不可言矣幸其相誤而因誤以中病乃得生耳吾不知此醫亦居功不自疑否如居功恐又為此婢竊笑也此二事深可為近世醫家提醒故謹志之人皆以黃耆人參白朮甘草當歸陳皮升麻柴胡八味為補中益氣湯噫此固補中益氣湯也特元氣下陷之補中益氣湯耳蓋中者脾胃也氣即脾胃之氣元氣也立方者以參耆甘術等藥善補中州之元氣而用之也因元氣之下陷不得不佐升柴以舉之非升柴之能補中氣亦非中氣之必佐升柴而後補也大醒天下執方之迷中氣既不必佐升柴而後補則凡有以參耆甘術相須而立方者皆補中益氣湯也不必定有升麻柴胡也如有因小兒慢驚與痘漿不足用參耆甘草三味名保元湯者有脾氣久衰用人參白朮茯苓甘草為四君子湯者脾虛有痰有濕四君子加陳皮半夏名六君子湯者飲食少進更加藿香砂仁為香砂六君子湯者有虛痰眩暈以參耆甘術合天麻半夏等藥為半夏天麻湯者又有合棗仁遠志龍眼當歸為歸脾湯者有大病後調理元氣用參朮膏參朮湯與參苓白朮散者有元氣暴脫脈微欲絕用人參一味為獨參湯者有暑傷元氣用生脈散清暑益氣等湯與氣虛挾寒而用人參理中湯附子理中湯者凡此之類皆謂之補中益氣湯可也藉微裴子終不解補中益氣湯之義矣皆謂之元氣不下陷之補中益氣湯亦可也但其間所夾之證與所兼之藥有不同故命名亦各各不同耳究其旨何一不在中氣二字上著意哉或問喘肺病也腫脾病也金匱丸是腎藥此金匱丸秘旨從無發明服之而兩證皆驗其故何也予曰腫雖屬脾而實因於水喘雖屬肺而實原於氣經曰腎者胃之關關門不利則聚水而為腫直指曰腎為氣之本腎虛不能為胃行其水液則不能納氣歸原而喘以作是則喘與腫即謂之腎家病可也金匱丸既是腎藥其奏平腫息喘功正所謂虎向水中生者此也所謂地黃有補脾利水之功無陰則陽無以化者亦此也天一生水水之凝成處便是土土中之堅者便是金也水生土土生金此先天五行之妙非知者曷足與言兩證之俱驗奚疑總之水土金為先天之一元此獨深詣其微耳一宦者年已近耄因勞倦傷脾脾虛病瘧瘧愈而脾胃之虛日益旋病腫焉此時飲食尚進起居亦不甚衰正宜補中益氣湯隨證加減以調脾胃元氣後用金匱腎氣丸補腎而行水使腫自消始為至治不謂日以澤瀉豬苓柴胡葛根厚朴陳皮等藥暮餌朝餐恬不知返兩月來真氣被賊無餘腫脹彌劇喘息不得眠者六晝夜更一醫猶以為肺病而用蘇子芥子二母二冬之類卒致湯飲俱廢而死王字泰曰手足浮腫未必成水也服耗氣利水之藥而不已則水病成矣趙養葵曰腎虛不能納氣歸元而作喘徒從事於肺者執流而忘源也惜哉安胎之說不可拘泥有無病而胎不安者有有病而胎不安者無病胎不安者杜仲人參地黃續斷熟文阿膠條芩歸術等類豈曰無功若有病必當先去其病病去而胎自安矣若不去其病而徒用安胎之藥則邪氣留而不去雖安亦不安矣如痢疾腹痛積滯壅凝不先乘其胎氣未虛之時而盪滌之痢何繇減瘧疾寒熱胃口必多壅滯遽用補血安胎之法瘧疾何自而衰傷食作痛飲食難下不先消導開胸飲食何繇得進傷寒熱在裡舌上生苔大便不通不用涼藥湯滌邪熱何繇而已故凡有如此等病必令早去一日胎便早安一日不則日久胎虛鮮不致墮昔黃帝問於歧伯曰婦人重身毒之何如歧伯曰有故無殞此之謂也一富室婦崩暈交作已三逾日不得愈諸醫治法不外阿膠地黃當歸白朮山藥人參及止痛止暈之藥益劇余診之六脈小而堅右關細滑有力且多呃逆欲吐狀心下按之硬滿而痛飲食不進大便不通此正與王節齋夫人崩暈證甚相類受病在腸胃無疑腸胃乃真氣運行之地亦諸病藁聚之地學者能時省焉則醫之能事畢矣法當先行腸胃中積滯使真氣流行脾得健運而統血崩自止暈自寧矣遽用前藥是以滯益滯奚怪乎無功遂屏諸藥先用導滯丸一服不動再一服大便始通神少清而崩亦少止改服開胃醒脾藥二劑崩暈頓減繼服大補脾丸甫半月飲啖起居如故若泥血病而專用補血等藥其與刻舟求劍膠柱鼓瑟者何以異一宦妾年甫兼旬不甚得所抑鬱傷脾飲食漸減幾半歲後乃月事不來日哺潮熱醫皆養血滋陰為治寢至肌肉消爍喘息不眠噁心不能食大便不通脈來數且弦右關特細素問謂二陽之病發心脾有不得隱曲女子不月其傳為風消為息賁者即此類也在法不治乃辭旬余果卒夫二陽胃與大腸也病傳化失常飲食少進也發心脾始於心脾也因不得遂其隱曲之情心脾鬱結而發也心主血脾統血腸胃既病則心脾無所資而血脈枯故不月血既枯則陰不勝陽而生熱熱盛則生風而肌肉消爍矣故曰風消肺屬金主氣金為熱迫則氣上賁而喘息不寧矣故曰息賁初治時即開導腸胃中積滯使真氣流通胸膈寬利能飲能食始用血分等藥調月事不來退日晡之潮熱方為至治前崩暈一證與此雖異共受病於腸胃則同也讀者參之乃不審二陽因抑鬱久而積滯不行為受病之根謾執月事不來日哺潮熱是血少陰虛病不消遙散則四物湯朝餐暮餌而卒至於死良可嘆也女人患此甚多余故詳著其徵並釋經義云學不博不可以為醫徒博亦不可以為醫醫者意也聖賢之精蘊形而上者之道也布在方策者言也形而下者之教也學者欲求聖賢之意不得不因言以求之非廣博不可也所謂教非道不立道非教不明也不求其意而徒事於言則雖讀盡天下古今奇書皆糟粕矣何異饕餮百種珍差填塞胸中而不化者乎病有一二劑而愈有數十劑或百劑而愈者有淺深故也感有淺深則其所以治之者非可概為欲速也欲速則寒熱溫涼行散補瀉能無過當乎如寒藥療熱者也寒太速則熱未已而冷疾隨生熱藥攻寒者也熱太速則寒未除而熱邪又起表者汗里者下汗速則亡陽下速則亡陰矣虛者補實者瀉補速則邪熾瀉速則正傷矣功未秦而害已滋不可不深為之意也昔許學士治一人發熱頭痛脈浮數麻黃湯證也尺獨遲而弱以仲景論尺遲者營不足未可遽汗進以建中湯加歸耆越宿脈尚爾其家欲速汗解許只建中湯調營而已五日尺方應始投麻黃湯二服汗出而解設不顧虛實不待時日禍旋踵矣南史載範云遇武帝九錫之命忽傷寒恐不得與慶事召徐文伯診懇曰可速瘥否徐曰易恐二年後不復起曰朝聞道夕死猶可況二年乎徐即以火煆地布桃柏葉置云於上頃刻汗出樸以溫粉明日愈云甚喜徐曰不足喜後二年果如此言凡病欲速愈而不顧其為後患者不必有佐命之暫榮凡欲求速快於心者其終必有傷而甘為夕死之續者也
