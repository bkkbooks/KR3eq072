body:
  text: 卷之三或問醫之療病須善用權權之義安解乎裴子曰權者無心物也宋子譬之秤錘以其秤物平施可輕亦可重也用之者胸中不得預擬一成見當在兩秤錘不得不在兩當在斤秤錘不得不在斤本非一定不移之物而有一定不移之理有一定不移之理無一定不移之心醫者必如是而後能乘時制宜以濟人之危而無弊如虛可補也容有時乎不可補而因攻以為補實可攻也容有時乎不可攻而假補以為攻病在此而治未嘗必在此病在彼而治未嘗必在彼病同而治或不與之同病異而治或不與之異硝黃之寒也以之攻寒桂附之熱也以之攻熱羌防發汗而還以斂汗蒼半傷津而即以生津地黃之濕亦有補脾利水之功茯苓之通亦有止溺塞精之益至於改湯作丸變丸為散朝黃連暮附子與怒勝思思勝恐恐勝喜喜勝悲之類無非權也用之者不知有所謂權也唯知時所不可不執素所守之可以為可時有所可不執素所守之不可以為不可耳夫不執素所守之可為可所不可為不可而以時之所可為可所不可為不可者乘乎時之所宜也時之所宜即理之所宜也理之所宜雖欲不權不可得也然則權豈易言哉非有才有膽有識有學而又虛其心者不能也何也蓋權之用在理而理之明在心故必使此心不致有纖微之蔽庶乎理可徹而用可圓心苟不虛心且受蔽理何明乎縱有學焉無識之學已縱有識焉無學之識已縱有才焉膽焉皆浮氣已安遽能乘時制宜而無弊耶由此言之則不獨無才無膽無識無學者不可以用權即有才有膽有識有學者亦未可以用權必有才有膽有識有學而又虛其心者始可以用權耳噫權豈易言哉夫方之能對病而取驗者自有所以對病取驗之理在不可專執本草中主治而曰某藥定是治某病某病定是用某藥而已也如一婦坐草已三逾日胞水盡行不得下寢變瞑眩無知牙關緊閉手足無氣以自動當此之際若論催生之藥則當歸川芎人參益母冬葵子之類其主治者矣余獨不然以半夏為君蒼朮澤瀉茯苓為臣人參黃連厚朴橘紅豆仁薑汁為佐使急煎俾飲一飲而蘇再飲而產是豈蒼朮半夏黃連諸藥能催生者乎蓋自有所以催生之理在本草未之及也又一士人大病久虛後已大受餐且服大補氣血之藥兼旬越宜其起矣不謂飲食頓減遍體畏寒自汗盜汗晝夜無寧已二三名家企擬多汗亡陽專以桂附參耆為治汗益多而寒益甚卒加參香至兩許仍爾也余則以羌活防風為君蒼朮半夏為臣黃連陳皮砂仁厚朴茯苓桂枝浮麥為佐使甫一劑而汗旋收並不畏寒矣隨制人參大補脾丸與之調理不逾月而康是豈羌活防風蒼朮半夏黃連諸藥能治大病日久之虛汗虛寒者乎蓋自有所以斂汗止寒又無損於大病久虛之理在本草未之及也或曰敢問香燥藥之能催生斂汗止虛寒者果何謂耶曰此從病之本而略病之名也論病之名雖有難產多汗畏寒之不同而其病之本則皆痰涎壅閉胃口耳胃口者真氣運行之樞所也彼難產者真氣本滯且經連日困頓飢飽難調穀食疏而湯飲雜勢必釀作痰涎以閉胃口則真氣益滯而不行視其瞑眩無知若狀可徵也故不得不用蒼朮半夏等藥開豁痰涎使真氣得行而自產耳若專事催生之藥適足為胃口增邪不生氣閉絕而子母盡傷不止矣至夫大病久虛後之多汗畏寒者亦猶是大病久虛後胃雖強而氣尚弱易於加餐難於運化且兼湯藥之補無虛日則濕熱必鬱於中宮而為痰涎矣故飲食頓減而多汗多寒耳或曰痰病食減亦誠有之若汗與寒則安所解曰人身捍衛之氣出於胃胃既為痰涎所閉則捍衛之氣不能布皮毛充腠理而多汗多寒矣先哲謂中脘有痰令人多寒脾濕不流令人多汗未知之乎其多汗而反用羌防者以多汗而腠理開風氣乘虛來客必先去其風而汗始易收也其畏寒而反用黃連者以寒非虛寒乃濕熱生痰所致之寒濕熱清而寒自止也有此病用此藥何嘗不遵本草中之主治哉但不執其主治之名而從主治之本耳昔王好古論人參曰肺熱用之則傷肺王節齋論人參曰陰虛血證忌服服之過多必不治余深味之皆千古不可移易之繩墨何後之妄議其非者紛然也是豈詞不足以發其理而人莫之解歟非也唱和成風耳熟心痼遂不復有揭其理而正其訛者矣謂非吾道之一大不幸哉夫所謂肺熱者即陰虛之肺熱也所謂陰虛者即肺熱之陰虛也蓋肺熱謂陽獨盛陰虛謂陰獨虛陰獨虛則陰不足以化陽而火熾火熾則爍金而咳血咯血乾嗽聲嘶諸肺熱之候所從出矣此正有陽無陰之瘵病有陽無陰四字人可深思治當曲盡養陰之法以化陽而救熱遽用人參助其陽氣則肺愈熱而陰愈虛喘嗽痰血不愈甚乎兩先生所以垂戒諄諄乃爾後人不察悉誤以素問無陽則陰無以生之旨認作陰虛之病論則曰造化之理陰從乎陽凡陰虛者必皆用人參補陽而生陰又執朱丹溪虛火可補參耆之屬暨張潔古人參補上焦元氣而瀉肺中火邪以及李東垣人參補元陽生陰血而瀉陰火諸論以為凡屬虛火肺火陰虛之火無不可用人參以補之遂懵然侈口而斥兩先生之非嗚呼何其不明之甚耶近有頤生微論亦效此口吻妄議兩先生可笑素問謂無陽則陰無以生論陽虛之病耳非所論於陰虛也其所論於陰虛者已自有無陰則陽無以化之句與此彰彰並載於書豈獨置之易講乎數千年晦蝕之旨一旦重光一則曰其無陽也治當補陽而生陰一則因其無陰而有陽也治當補陰以化陽耳明乎此則知其無陽者可以補陽而有陽者不可以補陽矣若以補陽氣不足之人參謾加於肺熱陰虛之病是有陽而又補其陽矣奚可哉若夫丹溪謂虛火可補非謂其可補氣虛之虛火也非謂人參可補陰虛之虛火也氣屬陽有餘便是火不足而補火自退有餘而補火愈熾矣潔古謂人參補上焦元氣而瀉肺中火邪者亦指其補上焦元氣不足而瀉肺中火邪也非謂人參能補陰血不足而瀉肺中火邪也至東垣謂人參補元陽生陰血而瀉陰火亦因元陽之不足不能生陰以制火故補之非為元陽之有餘也不究其理而妄議其非不大謬哉或曰然則四物湯之加知柏人參以治陰虛潮熱瓊玉膏之用人參以治肺腎陰虛嗽血靈苑方之用人參為末雞子清調服以治上氣喘急咳血唾血又大吐血後之不用血藥以獨參湯專補陽氣而生陰血豈盡欺人者乎曰其喘嗽潮熱咳血吐血等證固不可謂之陰虛不謂之肺熱其與兩先生之所謂陰虛謂肺熱者則不同也何也兩先生之所謂陰虛謂肺熱者謂陰獨虛而陽獨盛者也若四物加人參等方則是治陰虛陽亦虛之候也未至於陰獨虛而陽獨盛也或曰陰與陽若權衡一虛則必一盛豈有陰既虛而陽亦虛之理乎曰陰虛陽必盛勢固然也但陰之虛必自漸而虛陽之盛亦必自漸而盛陽自漸而盛僅可謂之陽漸盛未可謂之陽獨盛也未可謂之陽獨盛雖謂之陽亦虛亦可也蓋此時亦尚有可受補陽藥之餘地在故不得不用人參於補陰藥中以佐獨陰之不長不如是則陰無以生矣然用參者務須以陰虛陽盛之淺深為增損如四物湯治陰虛潮熱既加人參又加知柏為監製瓊玉膏治陰虛嗽血以生地黃為君而人參僅佐十五分之一亦皆衡量而施不敢多用以助陽之盛節齋先生復有過多不治一語良有苦心若至陰虛漸深陽盛亦漸深則未有不至陰獨虛而陽獨盛者矣至此便是有陽無陰之瘵病無論人參不敢多用即最少如瓊玉膏之法恐亦不無抱薪救火之虞矣靈苑方者乃治元氣大虛脈來無力之咯血唾血者耳獨參湯者乃治卒然大吐血後氣敗神疲六脈幾絕所謂陰竭而陽暴脫者耳更非所以治陰虛治肺熱也豈可遽執古方皆用人參遂指兩先生為非哉若遽指兩先生為非而謾加人參以誤有陽無陰之證於非命俗流必視人參為蛇蠍並視無陽則陰無以生之旨為空言而凡遇陰虛陽亦虛之候盡畏人參而不敢前矣其為禍於萬世蒼生寧有既耶或問痢之初發吐之無度新產之昏暈大吐血之不止傷寒發熱不休腹中痞堅如石胸痹腫突如嵐胃脘脹悶不能食氣喘痰升不得眠以至冷氣嗆心狂言奔走坐臥不寧腹中按之硬痛大便不通之數證世皆執為有餘之證而不敢用人參以補之者蓋此數證有餘者居多人參之所以難用耳子獨於此數證之間屢用人參而屢獲驗果何渭哉曰此皆似有餘而實不足之證非真有餘也不用人參以補之則虛虛之禍易可勝言曰何以知其似有餘而實不足也曰全憑乎脈而兼徵形色之榮枯呼吸之衰旺與手足面鼻之寒溫乃得之耳曰既憑乎脈其所現之證似有餘而所現之脈或不足猶可憑其脈而斷其虛若所現之證似有餘而所現之脈亦似乎其有餘者則將何所憑而斷其虛乎曰其所現之脈似乎有餘者非洪大則數極耳人見其脈之洪大遂謂有餘殊不知脈雖洪大而以指按之必隨指而軟散不能與指相搏矣素問所謂脈至而從按之不鼓者此也至於數極之脈似為有熱而不思有熱之數數而有敘無熱之數數而無倫無倫者言脈來之數極而至數不克整齊耳既得其脈而又以形色呼吸手足面鼻之虛實而推測之則其似有餘而實不足之證自無可匿其情矣此時縱有大實大滿大熱之候豈可遽執堅者削之留者攻之升者降之熱者寒之之法而誤人於非命哉垂教萬世無窮世俗謂產後三日內不可用人參測其意恐瘀血之不行耳噫果瘀血之不行而謂不可用誠是矣設有行之不止以至昏眩無知六脈幾絕手足盡冷而為血脫陽亡之候其亦可以不用乎竊恐此際即立煮人參薑桂急救之亦有不及濟者矣安問三日與不三日也今之病家醫家未經參究每遇產後但知有瘀血不行之可慮而不知有血脫陽亡之可危恆坐視人之死而不救可悼也夫一巨家室五月而小產產不逾時而即血崩不止六脈虛微神情昏倦此血欲脫而陽欲亡之候也予甚惶怖急以人參一兩肉桂二三錢不切而咀即注爐頭沸水急急煮飲以追既耗之元陽煮未半而室已運暈去更視之則六脈幾絕手足冷而通體涓涓汗矣予惶怖益甚忙取二大磁甌不待參味煮全旋以一注參汁少許急持與飲復以一又注少許急持與飲如此遞相持飲飲盡即脈起神蘇手足溫而汗已收矣既而胸中作滿疑故於參予謂此非參故乃湯飲多而不能頓行故也頃俟腹中有汨汨行下聲自平耳未幾果然然其所以用參之不切而咀而又以沸水急煮者何也恐稍緩不及濟事耳其注參汁於大甌而遞相少進者又何也恐參汁熱而驟難下口轉致遲遲耳非有他也不如是則徒有救人之心而無救人之術與不救者何以異甚哉成見之誤人也予昔治一女人難產後即發熱不止汗甚多而語甚錯六脈洪大而虛且又坐臥靡寧五六晝夜曾不經一閤眼此身不啻飄飄浮雲中則明是一個氣血大虧以致虛陽亢上的證候夫何以參朮歸耆丹皮童便及炒黑乾薑之類屢進而屢不驗且不止不驗反增頭眩耳鳴噁心嘈雜欲嘔不得嘔數證則知其非氣血之大虧乃痰涎之壅盛矣遂更一方半夏三錢天麻二錢鐵鏽水煎服不二劑而氣爽神清身涼脈靜矣繼以人參大補脾丸日進二服以培胃中元氣數日後漸覺飲啖加餐月餘全愈然則予之所以誤認為氣血之虧者執產後之成見於胸中耳須知學者不可不虛其心而廣其識也一士人於冬月患痢晝夜幾百余度裡急後重噁心不能食腹中按之硬痛六脈細數無倫手足面鼻俱青冷雖當初痢卻屬陽虛大非木香檳榔黃連大黃之所能治者急煮人參一兩桂附乾薑各一錢不食頃已再進竟不見有溫補之驗續與倍加桂附者二劑而後手足漸溫噁心漸止飲食亦漸進特痢未之減耳更以人參為君之大補脾丸仍加桂附俾旦晚服之以扶胃氣而加餐飲食此治本之第一要圖也半月來約服人參八九兩附子三枚脈始洪長有力口復燥渴而思飲冷其始則陰繼則為陽耳仍以大黃黃連檳榔芍藥之類滌去腸中宿垢後以加減參苓散作丸與之保全元氣昔余母年七十時先已熱病有年矣復於除夕陡然病痢痢次之頻不可以數計加之神昏不語雙眸倦開身發熱而面赤氣奔迫而脈洪大以虛默想如此高年如此久病如此脈證豈可遽以常痢常法療之也哉且察其所痢之勢甚頻而滑又不見裡急後重則明示以當補不當瀉之候隨取人參蓮肉各一兩砂仁一錢不間晨夕濃煎灌之至五日果得痢減神清身涼脈靜並索食矣自此日用補中益氣湯加桂附少許服至四十餘劑始得飲啖神情俱如故後幸終其天年度八十歲有奇而去一士人年三年餘性偏窒滯而多房欲忽於暑月腸胃堅結不行腹中按之硬痛且氣弱神疲不能食其脈則遲細而虛曾已快藥下者數四予謂此元氣大虛不能運行所致絕非有餘證更用前藥請勿復敢見矣遂違眾以人參二錢肉桂一錢大棗五枚不終朝而二劑雖不覺有補助之功然亦安妥而無忤後以補中益氣湯人參加至四五錢連服五六劑始克脈旺神昌頻餐粥食大便不攻自行一貴室婦傷寒汗下後脈洪大而熱不止口不渴腹不滿身不畏寒熱只氣乏神疲昏迷似睡叫呼不能以語應眾醫咸聚有謂傷寒兼中痰者有謂是狐惑傷寒者有謂腹中尚有燥屎更須通利者有謂餘熱未清更須和解者予曰皆非也乃元氣之大虛也以人參五錢當歸三錢炒黑乾薑二錢五味子三十粒不間晨夕者七餘服果得身涼脈靜氣爽神清偶得往來潮熱之候未可遽執為外感風寒輒服發表之藥蓋其間亦或有元氣內損而然者一或少差則陰證立至多死少生當此之際務期反心自忖數日以前數日以後有無勞倦之傷有無飢餒之失有無房欲之非反復加詳庶不致為醫藥所誤細心詳察吾鹽一高年紳止一子年三十餘素恃形氣強偉全不以醫是慎忽於癸未六月間因母壽觴宴客連日以致應酬勞頓遂發往來之熱類乎外感渠宿與一醫交善即邀以治之醫值他適其徒代為之視輒與羌活紫蘇防風等發散之藥一劑服後汗大出而熱益不止乃求治於余余往視則形氣雖不減於平時而六脈已細數無倫矣嗚呼本屬內傷又復大汗為之奈何即取人參黃耆各五錢附子肉桂各二錢當歸三錢浮小麥一撮急煎俾飲以冀其幸不謂處劑方成而渠師適至則亦認為外感輒棄予藥復以前湯表之汗更大出不止曾不移時絕不見有纖毫脈矣深夜而斃須知膏梁子弟外實內虛不可拘其氣強形偉遽恃之為大椿也昔予一故人賦性沉滯思慮偏多年至四十有六始生一子又值留都亡之次年抑鬱之懷勢必倍於疇昔則真氣內傷非伊朝夕也明矣形未病而神先病真內傷也忽當暑月復因時變奔馳失調飢飽隨病往來寒熱一似瘧焉時予遁跡山中聞問都杳不得與之候延一醫以為寒客而以羌活防風柴胡葛根等類汗之更一醫以為食滯而又以枳殼山楂陳皮厚朴等類瀉之若飲食則絕然不與病日增而體日困偶予入邑聞之急趨候而已身汗如淋兩脈盡脫莫之挽矣每念及此深為痛心一孝廉往為諸生時以遷居縈擾旦暮為勞且亦兼有少年事內傷元氣業已久之而於秋盡冬來忽發日哺之熱渠頗自負知醫恬不以意予為診之則六脈已虛疾無倫殊為可駭渠時見予畏難色反笑而迂之曰某瘧耳安足慮予曰勢且隨劇易以瘧云即處一湯以人參五錢桂附歸術各二錢囑曰急急煮飲差可無虞渠猶泄泄未之遽信曾不移時輒汗流如洗手足冷而目眩神疲就枕不能布語矣始信予言之不謬急以前湯連服五六劑人參加至一兩餘勢乃定於是自家而族而親友金相頌曰功莫大矣感何如之予曰未也三日內無變證方為佳兆眾疑而問其故予曰脈尚几几欲絕耳越日更往視則脈狀仍然而汗復以時至予心憂甚即止宿於渠家不避晨夜以猛圖事之必濟真心救人如此較之重惜名譽者不啻天淵旋用人參一兩附子半枚另用黃耆二兩煎湯煮之如此大劑不須臾而二進汗竟不止三進亦不止至四進猶復不止時參已竭而漏鼓已三沉矣家居郊垌無參可市為之奈何不得已復以煮過人參四兩咀而味之則亦尚有餘性即合煮汁以濟權時之竭卒至子後陽生之分補力方到而胃氣方回得啖糜粥二甌肉食數著而汗始止脈亦自此有敘不至虛疾無倫矣可見胃氣便是元氣遲明急市人參以繼之後全愈四逾年得舉鄉試時有聞其捷音者握予手而言曰某貴矣必憶當年用藥人也予曰今日可貴昔日自然天相於裴生乎奚有聞者曰某鄙人也幾以陋俗者陋子矣長病與高年病大要在保全胃氣保全胃氣在食不在藥萬不可專攻於藥致妨於食倘其力所能食時所當食寧可因食而廢藥不可因藥而廢食日月中天人當病愈後胃氣必虛固不可恣情口吻尤不可小心太過絕口不沾肉味或曰本草謂豬肉助火生痰發風動氣於人有損無益子何出此言也予曰人以血氣成軀虛則當以血氣之味為補助此固自然之至理岐伯所以有肉為胃藥之稱孟氏所以有非肉不飽之論也朝與夕親心以成性雖有助火生痰發風動氣之害亦與之俱化矣予有一譬焉譬之藥中之大黃非所稱有損無益者乎而或蟲生其間則必不能離大黃以為命設取而飼之人參白朮之中其蟲反不得所而死矣此各隨其質之所由生性之所由習豈概論物味之損與益哉又如汙泥糞壤孰不以為穢惡之物唾而遠也其間或生蟲焉則亦必藉汙泥糞壤以為命矣倘憐而愛之者將畜之於清谿冽澗之中其為蟲也得更有逾時之命乎由此推之則豬肉之於人未嘗有損而無益也澉川一故人子傷寒旬日後身熱不止形氣衰疲語言低怯頗近危困及脈之則兩手皆平一似無所病者從脈不從證者此也隨詢之曰腹中飢否曰飢甚急取糜粥一碗與之食便覺神情蘇若有生趣矣頃之復思雞子食即以雞子二枚攪勻和水熟而食之更覺神情愉悅語言多力矣未幾聞有肉絲與筍菜調羹香美欲食遣婢問余余沉思良久曰食亦不礙隨與肉絲羹碗許一啖而盡半日間神情頓為清徹並不知其熱之於何而解矣時渠尊老自山中請卜而歸張皇殊甚未交揖輒問予曰此兒可得復生乎予故戲之曰不能曰是則奈何不識尚可用藥否曰頃已三劑矣一粥二雞子三肉絲羹渠老不覺驚喜交集撫予肩背而大聲曰是何治法曰無他病已去胃已虛所少者食物耳何必姜三片棗二枚服不拘時渣再煎也趣極傷寒初起時則畏寒喜熱數日後寒邪傳裡變為熱邪不畏寒反畏熱矣此際慎勿扃門塞牖垂幕多衾以助其勢倘更畏熱之甚渴欲飲水躁欲裸形亦便當權時任性勿得過為拘忌不止傷寒為然凡雜病有餘之熱法亦同之傷寒熱極狂躁渴欲飲冷而以橘藕瓜梨之類及新汲井水涼而解之者先賢之立法也世人不曉謂是予之臆說而不敢用其為誤也可勝言哉類編所載程元章夫婦皆嗜鱉一婢日主烹飪不適口即撻之偶一日得一鱉頗肥大夫婦以足充其嗜喜甚執行操刀欲屠忽不忍其伸縮用釋縛而置之後園池中夫婦以鱉失怒而重撻越二年婢患熱病昏聵幾死遂移棄後園池亭以待盡不謂天未曉後宅有扣扉聲眾疑為鬼婢曰是某耳啟之果然眾驚問其故對曰夜將半彷彿一黑物將濕泥萍草遍覆周身頓覺肢體清涼百苦盡脫始知獨臥亭子上夫婦異甚迨暮復使往效昨夕所為而密伺之見一大鱉負水藻泥蘋自池中出夫婦不省所以婢遂實以往事告急涸其他果得一鱉已倍大子昔矣尾後穿竅猶存即遣使送至深淵自此夫婦感悟永不食鱉嗚呼一水族之微而亦識熱者寒之之法不亦深可慨哉傷寒本是陽證若至日久不痊須防陰證蓋傷寒日久元氣已虛更或寒涼與汗下之藥太過則元氣之虛益甚陽證變陰恆有之耳其脈則洪數無根或斷續不整與細疾無倫次手足則乍溫乍冷或手足未冷而鼻端先冷此時縱有躁渴狂譫舌胎便結等熱證不可更用涼藥矣急當以桂附參姜酌微甚而溫補之溫補之後倘或復見陽證陽脈者不妨仍用陽證之藥煮藥用水天泉為上山水次之河水又次之至於井水則陽和微而陰濁勝非病所堪唯傷暑傷寒之熱極宜新汲而飲之彼城市中人日用井水而不深害者習之熟也若有病則又是不用井水為良張子和曰余昔訪靈臺間太史見銅壺之漏水焉太史召司水者曰此水已三環周水滑則漏迅漏迅則刻差當易新水余劃然悟曰天下之水用之滅火則同濡稿則同至於性從地變質與物遷未嘗罔焉故蜀江濯錦則鮮濟源烹楮則吅奄南陽之潭漸於菊其人多壽遼東之澗通於葠其人多發晉之山產礬石泉可愈痘戒之麓伏硫黃湯可浴癘又如冰水咽而霍亂息流水飲而癃閉通雪水洗目而赤退鹹水濯肌而癆干千流萬種言不容盡至於井之水一也尚數名焉及酌而傾曰倒流出甃未放曰無根無時初出曰新汲將旦首出曰井華一井之水而功用不同豈烹煮之間將行藥勢獨不擇夫水哉用水者其熟察之煮藥之法取味者炎宜緩取氣者炎宜速若遇倉卒之病則不論取氣取味皆宜速緩則病邪滋蔓蔓難圖也余每到病勢危篤之家未診視先令急煮水診視竣水即湯湯矣取藥煮之差可濟急世俗眼藥之弊有六有食已而即藥者有藥已而即恣飲茶湯者有藥食雜進而恬不之忌者有才服此醫之藥而旋以彼醫之藥繼之者有明受此醫之藥而陰則服彼醫之藥不肯明言以欺者更有苦於服藥所授湯丸必潛傾廢中外侍人又為互隱而無可稽窮者病或偶減固無論已設或偶增咎將安責病中固宜節食尤宜節飲食傷人所易知飲傷人都不覺不唯茶湯漿酒以及冰泉瓜果之傷謂之傷飲即服藥過多亦謂之傷飲其見證也輕則腹滿腸鳴為嘔為吐重則腹急如鼓為喘為呃甚則緊閉牙關涎流口角昏憒不醒人事狀類中風患此證者滔滔皆是或未有識不得不為來者言之世俗謂病瘧之人忌茶忌藥不則令人中滿余深味之亦甚有理特詞未之達耳所謂忌茶者非忌茶也忌茶湯也謂病瘧之人茶湯不可過飲也忌藥者非忌藥也忌湯藥也謂病瘧之人湯藥不可恣投也蓋病瘧之人中宮多濕若更過飲茶湯恣投湯藥則以濕助濕矣鮮有不敗脾元而成中滿之候者孰謂恆言無補於世哉脾胃者養生家第一要具也不可使之熟生物熱冷物軟硬物雖然竟是有食生而不見為生所積食冷而不見為冷所凝食硬而不見為硬所礙者此皆逞脾胃強旺之熱於一時實不足為養生訓也舉凡胸腹中有痰有飲有積有痞或脹或痛或酸或糟或吐或瀉一二症時止時作經年不瘥者急須猛意以圖全愈毋俟他日別病相加掣肘莫措然其所治之法則灼艾先而藥石次蓋灼艾治與藥石不同藥石固能治病久之必動腸胃妨飲食而壞元氣灼艾則不唯能治病並不動腸胃妨飲食以致壞元氣耳嗟嗟世之人喜藥石而惡灼艾者多矣而抑知灼艾之為功遠逾草根木皮萬萬也今人皆徒治其末不治其本所以十病九失灼艾後唯節飲食三字為首務不可饕餮厚味致傷胃氣今之人一經灼艾便以食不勝人為憂其始也胃氣未傷猶能勉力啖嚼數日後胃氣被傷即脹滿而不能食不瀉則吐不吐則瘧與痢所從出矣更不思自貽伊戚而猶咎施艾者之無功良可笑也良可悲也虛勞病唯於初起時急急早灸膏肓等穴為上策外此則絕房室息妄想戒惱怒慎起居節飲食以助火攻之不逮一或稍遲脈旋增數雖有良工勿克為已葛可久曰癆證最為難治當治於微病之初莫治於已病之後深有旨也至夫藥餌則貴專而少不貴泛而多萬不可謾聽名流積月窮年不撤潤肺滋陰之藥潤肺滋陰之藥擅名固美釀禍極深不可不知不可不慎世欲謬以周身刺痛為鬼箭打不知此病乃是濕痰與氣交滯而成滯於腰則腰痛滯於背則背痛滯於胸肋則胸肋痛豈有鬼箭之理哉治當破氣而兼燥濕消痰之藥痛無不止今世俗有以針挑揩擦而痛亦能止之者卻合此破氣行滯之一法未可遽指為非也唯是草漿油酒與穢惡不堪之異味害人不淺耳胃之強者間可倖生胃之弱者卒無一人免於死痛哉凡胃氣不足之人斷不可謾服草頭藥汁草頭藥汁最能傷胃胃氣虛者服之必死縱或不死胃氣終難完復且更是有草類相似收採不真誤中殺人之毒於頃刻間而莫之救者矣歷有明驗言之慘人紹興有僧名希賜者從客舟自番禺至舟中有士人攜一僕病腳弱不能行僧憫之曰吾有一藥能治效如影響餌之而瘥者不可勝計僧進寒廟飲頗醉即入山採藥遽投酒中授病者服之方入口轍呻吟云腸胃痛極如刀割截遲明死士隨以咎僧僧曰安有此事即取昨夕所餘藥自投酒服之不逾時亦死蓋由山中多斷腸草人食之即死僧之所採想為根蔓所纏結因醉不之擇是以及於禍信知草藥不可輕服也一人年已望六熱病半載矣飲食少進體中倦怠忽患黃疸證有授以草頭藥汁連服三日疸未除而吐瀉交作矣遂致絕粒卒至不救遵生者鑑之凡瀉病痢病蟲病疳病水病酒病疸病於初愈時斷不可驟服滋補之藥蓋此數病以濕熱為源滋補之藥乃助濕熱之尤者驟而服之鮮不致害昔當湖一孝廉與予通家世講也其為人偏滯而多思第無事而恆慼慼偶於甲午秋初忽病疸後雖全愈用飯未能照常則脾尚虛而濕未清也會值公車北上有一醫制以天王補心丹數斤為贐奈一往舟中餌無虛日未中途漸覺胸膈有礙飲食復以日退全不察其藥之有為害也仍日餌之無間入春而疽病復作迨歸而形容枯稿僅存皮骨其腹龐然按之若石始則為疸繼則為鼓也皆脾虛坐濕之所從也招予往治真氣已衰敗無餘無可著手處矣越旬湯飲俱絕而死此亦誤投滋補之一驗也昔一好補者於暑月暴瀉服蒼朮厚朴澤瀉豬苓黃連砂仁等藥二劑業已愈後唯節飲節食以全胃氣可耳不必更事藥也好補者以為既瀉之後元氣必虛輒用人參白朮甘草黃耆米仁山藥之類一服頓爾胸中滿悶大便窒澀不通且三四日不能飲與食乃就質於予予曰暴瀉初安濕邪未盡遽投大補之藥是賚盜糧養寇兵矣奚怪其為然也即取蒼朮為君佐以枳實厚朴澤瀉陳皮砂仁半夏木香山楂之屬作丸俾服而痊語云病去勿得妄加攻補良有至理凡近產不可祈問卜聽彼巫覡之徒乘機哄嚇以吉為凶當何禱神當何求佛致使孕者憂疑恐懼夢想多成危境真氣反因鬱結而不舒臨產之際不難產亦自難產矣患此弊者急用人參白朮當歸川芎砂仁枳殼蘇梗大腹皮之類日煎服之以舒鬱氣而扶真氣人但知臨產可危而不知既產尤可危人但知難產可危而不知易產尤可危人但知病產可危而不知健產尤可危是何也臨產難產病產在勢為逆逆則人人皆懼懼則心倍兢持未或有失既產易產健產在勢為順順則人人皆忽忽則心恆懈弛反致多虞呂氏曰懼者福之門忽者禍之源理固然也妊婦調攝之要單在養氣養氣即是養力能養其力則產固不難亦更無他病其養氣之法勿過勞勿過逸勿過飢勿過飽更勿得為憂為悲為驚為恐與怒而後以參朮芎歸砂仁枳殼之類補助之則真氣自能充塞流行於身而不息有何產之足慮而病之足虞也若不知此養氣之法而過勞則氣為之耗過逸則氣為之滯過飢則氣為之衰過飽則氣為之閉更若憂焉則氣結悲焉則氣消驚焉則氣亂恐焉則氣下怒焉則氣逆矣又何產之不足慮而病之不足虞也最險是橫生逆產未產時頭則向上迨將產勢必轉身覓路而生頭乃向下若兒身方轉頭未向下竟被產母用力一逼兒將錯路無門不橫生便逆產矣其轉身時痛楚難忍只宜寬心少待待兒轉身既定頭已向下腰痛如刀割截方可用力至期須得諳事穩婆與老成人侍奉庶不誤事此法可傳授收生婆臨產勿得妄用催生藥催生藥者因產之難而設也產若不難催必反害孕婦臨月常有試月與弄胎兩候其候似乎即產忽不逾時而胎復安焉如故更越旬余或二旬始得正產倘不加察妄意催之禍旋踵矣余於臨產止用獨參湯佛手散益母膏產固宜不產亦無不宜也凡勞心與勞力之人須時偷閒調息以保既耗之元氣蓋氣根於息息調則氣調氣調則一身之中無不流通四達而百脈安和神情清泰雖勞不甚苦人矣調息之法端默靜坐謝境澄心口目俱閉止於鼻中徐呼徐吸任我自然勿得作意思為著力太重反使本來不息之真窒而不利讀書家必習養生法能習養生法不唯於身利更於心利舉其要莫先於少睡少睡則神靈神靈則氣爽氣爽神靈身心自然交利矣然少睡之工有六靜而勿躁一也疏遠房室二也常收此心於腔子中三也深夜勿寒勿餒四也行住坐臥不忘調息想五也每日將哺神氣昏濁輒偷閒一憩六也此六者行之日久不自知其惺惺少寐矣善讀書者幸勿以此為迂凡用補藥必兼瀉邪邪去則補藥得力譬之滌衣先除垢膩而後粉飾可加耳若專事補而不知邪氣之當瀉補必為害無病時之脈各有不同或偏洪大而浮者或偏細小而沉者或偏有力而數者或偏無力而遲者此各本來所賦使然非關病也必於平時預與善診者審究詳明熟識本來脈狀庶有病之時易為推測而無認彼作此之誤瀉病無他治寧飢毋飽是其治也諺云肚瀉無藥醫餓到日蹉西言雖俚鄙切中病情不可不為之三複然可戒而不可犯者有五一酒二晚餐三湯飲四生冷五油膩腥膻戒之而瀉不愈者未之有也犯之而瀉得愈者未之有也病之加於小愈者因小愈而放其心也天下事處逆者恆多易處順者反多難病當未愈而求愈時欲不得逞志不敢肆凡語言動止飢飽寒溫以及情性喜怒之間無不小心翼翼自然逆可為順不期愈而不愈者鮮矣愈則此心不覺康強自慰豈啻自慰並侍奉者亦慰便多不能保護處矣保護漸疏恣口吻也爽寒溫也多語言也費營慮也近房室也順情性而煩惱也廣應酬而不自知為勞且傷也有謂病不反加於此者無之矣因憶孟夫子生於憂患死於安樂之說信不可不書紳而銘座右也人咸謂神昏之病原於心心清神乃清愚謂神昏之病原於胃胃清神乃清或疑神藏於心於胃何與曰藏神者心而攝神者氣氣出於胃胃氣不清則不能攝神歸舍而心神之昏昧也必矣子如不信不觀醉酒之人乎醉酒之人醉胃不醉心也何以神昏而語言錯亂也不觀飽食之人乎飽食之人飽胃不飽心也何以神昏而頹然欲寐也不觀痰涎壅塞之病乎痰涎壅塞之病病於胃未嘗病於心何以神昏而瞑眩無知若中狀也不觀陽明內實之病乎陽明內實之病病於胃未嘗病於心何以神昏而躁妄狂譫如祟也或乃為之撫然曰命中之矣凡有以問疾來者勿得與之相接一人相接勢必人人相接多費語言以耗神氣心所契者又因契而忘倦心所憎者又因憎而生嗔甚或坐盈一室竟起談風縱不耐煩又不敢直辭以去嗟嗟有病之人能克幾何而堪若此恐不終朝而病已增劇矣然此猶為害之小者耳更有一等搖唇鼓舌好事生非病者一或輕聽必致惱怒填胸不知自愛而其為害又不可言智者於此休將性命做人情病中但可安分調攝不可偏信師巫殺害生命不唯損貲造業更使心志狐疑溺情鬼窟而切身珍愛之圖反置勿問愚孰甚焉病人臥榻不可薄以茵褥致使隱寒犯背寢傷五臟之陽變證增邪莫此為甚仙經曰背以陽為主而五臟之俞穴通焉一被寒侵則寒氣由愈入臟而臟寒臟寒則陰盛陰盛則陽衰陽衰則轉輸遲滯傳送乖違氣血亦為之損敗輕病必重重病必至於死矣可不慎乎世都忽而不察所以夭折者多矣不特病時不可即平時亦是不可有有病素不服藥者不為無見但須知得病從何而來當從何去便是藥耳如飢則食食即藥也不飢則不食不食即藥也渴則飲飲即藥也不渴則不飲不飲即藥也惡風知傷風避風便是藥惡酒知傷酒戒酒便是藥逸可以治勞靜可以治躁處陰以卻暑就燠以勝寒衰於精者寡以欲耗於氣者守以默怯於神者絕以思無非對病藥也人唯不自知耳無上至言亦無上至藥崩漏與腸風日久鮮有不至脾胃愆和飲食無味而發腫發黃者一見此證便當從脾虛不能攝血歸元為治萬不可仍執血分之病而用血分之藥此說業有詳論似毋庸贅但恐成心不化者既欲補脾而復拖泥帶水又兼補血之藥於補脾之中不得不贅耳既補其脾又補其血在飲食未至減嘗者猶可若飲食大減又加噁心嘔吐而胸滿不舒者不將速其死乎法當專用參苓白朮散少加燥濕寬中之屬以佐山藥扁豆蓮肉米仁之滯有熱加黃連有寒加桂附飲食少進者先服大補脾丸元氣下陷者兼用補中益氣未有不謬者也飲食何以能養人也由脾胃之運化非飲食所能也藥餌何以能治病也亦由脾胃之運化非藥餌所能也然則脾胃何以能運化飲食與藥餌也實由水火二氣又非脾胃所能也有司命之責者其參之窮源之學人當臥病務須常存退步心心能退步則方寸之間可使天寬地曠世情俗味必不致過戀於心縱有病焉可計日而起矣不則今日當歸芍藥明日甘草人參是以江河填漏卮雖多無益也先儒有言予臥病時常於胸前多書死字每書數過頓覺此心寂然不動萬念俱灰四大幾非我有又何病之足慮哉雖然此惟可與達者言也一縉紳子年三十餘囊固饒裕良田又幾二十頃且已有子亦可謂無不如意者矣後忽心志改常二六時中無刻不恣嗟太息愁怨不勝如此者四五年遂患驚悸怔忡恍惚不得寐等證遠近醫家延之迨遍有安神者有養血者有補氣生精者有消痰與降火者備餌彌劇卒至如迷如昧如顛如狂棰胸齧舌而死究其病所從來則為數年前訟費千餘金耳嗚呼如此富家但知有身外之微而不知有性命之大縱可憐不足惜也世間類是者頗眾因志之以為後鑑羅先生曰收拾一片真正精神揀擇一條直捷路徑安頓一處寬舒地步共好朋友涵泳優遊忘年忘世俾吾心體段與天地為徒吾心意況共鳶魚活潑其形雖止七尺而其量實包太虛其齒雖近壯衰而其真不減童稚每讀一過頓開無限心胸勝服百劑清涼散也鄺子元由翰林補外十餘年矣不得賜還嘗侘傺無聊遂成心疾每疾作輒昏聵如夢或發譫語有時不作無異平時或曰真空寺老僧不用符藥能治心疾往叩之老僧曰相公貴恙起於煩惱生於妄想夫妄想之來其幾有三或追憶數十年前榮辱恩仇悲歡離合及種種閒情此是過去妄想也或事到跟前可以順應若乃畏首畏尾三番四復猶豫不決此是見在妄想也或期日後富貴榮華皆如所願或期功成名遂告老歸田或期子孫登榮以繼書香與夫不可必成不可必得之事此是未來妄想也三者妄想忽然而生忽然而滅禪家謂之幻心能昭見其妄而斬斷念頭禪家謂之覺心曰不患念起惟患覺遲此心若同太虛煩惱何處安腳又曰相公貴恙亦原於水火不交何以故凡溺愛冶容而作色荒禪家謂之外感之欲夜深枕上思得冶容或成宵寐之變禪家謂之內生之欲二者之欲綢繆染著皆消耗元精若能離之則腎水滋生可以上交於心至若思索文字忘其寢食禪家謂之理障經綸職業不告劬勩禪家謂之事障二者之障雖非人慾亦損性靈若能遣之則心火不致上炎可以下交於腎故曰塵不相緣根無所偶返流會一六慾不引又曰苦海無邊回頭是岸子元如其言乃獨處一室掃空萬綠靜坐月餘心疾如失昔汪石山治一婦年三十餘形瘦而色蒼忽患狂病語言譫妄披髮裸形不知羞惡眾皆以為心風有欲吐以痰藥有欲飲以糞清不之決汪診其脈浮緩而濡曰此蓋由忍飢勞倦致傷胃氣而然耳經云二陽之病發心脾二陽者胃與大腸也忍飢過勞胃傷而火動矣發心脾者延及干心脾也延及心脾則心所藏之神與脾所藏之意皆擾亂無依而病狂矣內傷發狂陽明虛也法當補之遂用獨參湯加竹瀝飲之數日愈予自來歷境多艱而此心則未嘗不樂天生我為人非樂何身有常疾不敢恣嗜欲適足養生非樂何交有良朋日聆格言莊語頗知敢畏非樂何性偏疏懶省卻營營苟苟此身常覺自在非樂何雖無厚望在人不見斥於有道非樂何不讀書亦時得會心語不坐禪亦時得見自性非樂何世固有日處樂而不知樂有日處樂而反不樂有日處樂而不安其樂必置身於不樂吾不知其解矣偶於乙未春百疾並乘臥榻不起者累日深悔平時少一節字已而思之節字該得廣豈止關於疾哉凡家居日用以及交與應酬語默動止之間隨時隨處無一不因節而得不因不節而失者也然節者中也正先儒所謂行乎其所不得不行止乎其所不得不止也設當止焉而勿止非節矣設當行焉而遽止亦非節矣唯深於中道者乃於與言節字看得好舉世診脈都用簡篇為墊手之具不思簡篇所載悉聖賢經傳昭垂萬古至尊至貴豈可輕為借用甚且褻之於床第之間汙之以穢惡之手有人心者安乎否也習以成風竟無覺音惟予友錢商隱一人深以是嚴更欲以是嚴天下因命予筆之以廣其勸是亦與敬惜字紙者同旨也幸勿見迂為望
