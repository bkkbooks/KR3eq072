body:
  text: 凡則醫之道難言矣余何人斯敢僭言也唯是醫教衰而醫日流於弊古聖賢仁壽之傅幾歸淪沒遂不自禁其婆心之熱率蠡見而僭言之也知我罪我其在茲乎是帙余之隨筆也偶有得隨筆而載之雖不及別門序類一一詳言而其理則無一不貫蓋醫者意也言不足以盡觸此便可通彼耳善讀書者當不作殘編斷簡觀帙中一畫小心治虛傷藥傷飲久病後金匱丸大補脾丸不執本草主治諸篇皆言古人所未言者命門二火陰證用權補中湯陰陽氣血流濕潤燥柏齊水火辨諸篇皆言古人所已言而未得其旨者勿藥王霸産後胎前執流守主內傷元氣脾胃統論好古節齊人參論諸篇皆言古人言不克竟與邪說亂真而未經補救者余則但言常變時宜平易近情道理以挽習俗之非醫書生死書也最忌迂而不切晦而不明以滋學者之惑此余所不得已而作此既明且切之言以便學者觸眼即豁不致低徊沉索也雖然言非徒言恐又不可因其觸眼即豁而不低徊沉索也人身所賴唯脾胃脾胃所賴唯元氣元氣非脾胃不能運行脾胃非元氣不能生化此形上形下不得相離之至理以故本帙中無一字一句不是照顧脾胃元氣之言是在閲者沉心理會始見但其間微理而費不克盡余所欲言心竊未映近來言醫者類重方藥而輕調攝若余則重調攝而輕方藥蓋方藥止優於祛病而不優於養生調攝則不止優於養生而更優於祛病在昔歧黃靈素醫學祖也千萬語言只是教人節飲食慎起居少嗜欲適寒溫勿失養生之道而已曷嘗有所謂方藥哉深於醫者以為然否帙中所載治案有虛反攻而實反補者有寒治寒而熱治熱者有取彼得此而取此得彼者有病同藥異而病異藥同者有處變視之以常而處常視之以變者是皆因其病用其法非故設不經之奇幟以炫己而欺人也第邇來諱疾者恆衆故只就病載病不表姓名古來明醫家鮮有不知太極之理者知有太極則知人有所以生而非形矣形有所以死而非病矣病有所以治而非藥石矣余雖不敏早歲時已參其旨嗣後攻苦日深漸臻悟境便不為形下之學所拘故此書雖不言言及太極而太極之理無勿寓噫此固造化根也衆妙門也不止醫學所從出也是峽謬辱楚中毛槐眉吳門金聖嘆云間蔣斧山四明張振仲武林趙聲伯禾郡朱子若同邑鍾孺西胡孝轅陳則梁諸先生各錫瑤序並其首是無異蠅之附驥不難不千里行矣第皆獎借過實大非涼德所堪用是懷慚不敢遽梓僅自序其略焉耳
