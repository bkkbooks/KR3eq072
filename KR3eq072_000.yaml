front:
  text: 毛序嘗讀物理論醫者非仁愛不可托非聰明理達不可任非廉潔淳良不可信然則操歧黃之術者非徒識多少湯頭認幾許藥味務為名高以自炫也裴子兆期六技四家貫幽達微九竅五臟豁然參兩處剖不失分銖匪第十日有瘳著臨朝探玄奧庶幾九折為良古所稱可托可任可信兆期殆參同而隱括之世之服其藥者不可不讀其書而能讀其書者龍勝飲其藥奚待飲上池之水藉終歲之功始稱名醫哉雖然有名而良者有無名而良者醫原不在名也昔扁鵲為魯公扈梢喬嬰治疾一志強而氣弱一志弱而氣強剖身探心易置之而彌善微乎微乎此非聰明理達廉潔淳良本諸仁相何易語此兆期將安所取法乎武原東濱大海海外三神山在焉應多生奇人以壽世他日功成十全久視飛仙變六一於金液改三七於銀丸兆期之書且與中經內籍並觀矣楚競陵毛一駿題趙序吾快讀裴子之書而異之也學不貫古今識不通天人才不近仙心不近佛者寧耕田織布取衣食耳斷不可作醫以誤世醫固神聖之業非後世讀書未成生計未就擇術而居之具也是必慧有夙因念有專刁窮致天人之理精思竭慮於古今之書而後可言醫每見庸工治病十失其五良工治病亦十失其一由一以循纍之誤亦未忍言也即能窮致天人之理精思竭慮古今之書而病伏於內醫測於外病以奇伏醫以意測幸而得則竟得矣或偶不得則不為二豎所笑者無之此扁鵲所以需上池之水而思邈所以藉龍宮之方也夫上池之水不易得龍宮之方不再傳則惟窮理讀書以學識參造化之權而後可若裴子者斯其人矣若裴子者固數百年所未出之人也古今之有學識者當首推張戴人及劉河間能與病血戰而不奉表稱臣於病第未免過甚耳其餘諸家立法非不善實為鄉願逋逃之藪故謂醫有成心不可也謂醫有成理尤不可也無成理而有或效醫信難言哉裴子之言曰以生死易視者易之固數百年所未出之言也獨謂裴子學貫今古識通天人才則仙而心則佛信也非譽矣誦其言皆軒歧所欲言而深悔未及言亦諸大家所欲言而格格不能言豈帝憫枉札之禍助其神智而授之使言歟推此而失者可得難者可易而謂醫無成理尤不可也余以多病學醫日為醫而醫日下初似可遊刃跡皆茫然抑鬱焦思徒廢寢食行將耕田織布棄醫而去以求無誤於世今秋得晤個亭先生極口兆期裴子學識且示以所著書余嚮慕裴子名而不圖其貫通至此也一再讀之豁乎快有所獲裴子教我矣何時共晨夕而相咨晰究竟此神聖之業哉歲在丁酉中秋日友弟趙善鳴聲伯父題友弟陳龍運階尺父書自序或問醫易乎裴子曰以生死易視者易之若余則未敢自信昔先君子以醫鳴世余見其治輒響應亦嘗私易之而不知人之有生死非不知人之有生死不知醫藥之於人有生與死耳先君子沒而余世其業乃較讎歧黃靈素與諸大家遺書凡七更年數四過始瞿然有覺而知醫藥之於人有生又有死自謂於斯有得及臨證則疑焉罔決者猶十七治上矣又攻其下療彼矣更顧其此色既呈而脈難合診或得而證不形測以寒寒未除而熱已起擬以熱熱未去而寒復生欲祛寒則懼熱不前欲救熱則思寒思止大實似羸補之慮其實實至虛似盛瀉之犯其虛虛眩惑葸縮十有年則又知醫藥之於人死者多而生者少矣以是夙夜彌勤眠食盡損研窮羲易博採空玄舉天地間氣運物理古今治亂興衰吉凶進退及傳記百家之書有可與斯道推類而長者參稽亦已逮半更訪前哲如張子綱神醫也兒以承氣而誤已之子張仲景醫聖也猶有急下急溫半劑少與及微和胃氣之戒慎丘子得許學士而生全範云因武帝七錫之命而夭折所爭僅汗遲與汗早毫釐疑似輕重疾徐之間死生易如反掌誠非細故究其極則人之所以病而病之所以治又不在形骸藥石先聖賢陳跡上探求者敢謂醫學無難哉卒知醫藥之於人幾有死而無生矣囪此纖微倍凜皮毛疥疹視若膏肓甘草陳皮畏如鴆毒雖或群起而爭曰易吾勿信也嗟嗟余之漁獵醫林以醞釀乎丹府有年矣不可謂草草也夫何歷一境轉深一境之難乎今老矣或云優矣乃益茫若望洋莫測其際仍然未學時不知醫藥之可以生死人也已語云無學者不可與言醫有學者亦未可與言醫厥有旨哉雖然世固有不經研索夕拮据而旦施行者矣此聰敏過人是天授非人力謂之易也亦宜時崇禎十七年歲在甲申春莫復庵居士裴一中兆期父序陳序今江浙之稱世醫者必宗裴氏而裴氏之克紹箕裘卓絶當代者惟健飛一人而已健飛世居禾郡之武原邑其尊公兆期先生與余執手交窮天人之祕闡靈蘭之奧數十年間孜孜博濟躋斯世於仁壽之域全活者以萬計凡黃童白叟緑緩青襟無不交口而頌先生之德今健飛業洪繼述道尚淵源四方仰冀一匕者或金莖仙露然是殆有神授非可測識誰謂上池之水獨擅譽於當年龍官之方不再見於今日耶舉世駭其靈奇咸目裴子為天縱余曰從古無不學問之神仙裴子天資敏悟學力沉酣凡三墳五典五運六氣金匱玉函之精丹臺瓊冊之密悉廣稽博覽融洽淹通雖隔垣之視不足云也諸如六淫外侵七情內作表裡虛實之宜補瀉宣通之法上下千古確有定見至於先天資始之源後天生物之本乙癸同源之理變化疑似之微鮮不洞燭人但知其能拯九死之症而不知其曾讀未見之書也今之醫師知以寒治熱以熱治寒以通治塞以塞治通而已矣而健飛獨明於塞因塞用通因通用寒因熱用熱因寒用用熱遠寒用寒遠寒各有妙諦更深究夫窮源探本之論謂見痰休治痰見血休治血無汗不發汗有熱莫攻熱喘生毋耗氣精遺勿澀泄種種人所難知健飛澄心味道頗得箇中之趣是以疏方用劑絶不類時師而其得心應手斡旋造化應若桴鼓真猶龍之老氏豈可憶度而管窺乎辛亥之夏余同善長孫法師禱雨吳山甘霖大霈因訪健飛於育嬰堂堂之主人乃余友陸宗黃也誠心保赤樂善不倦向與兆期為比鄰至交出其所鐫言醫四卷言言玉髓字字金篦如唐之巫咸周之長桑秦之和緩宋之文摯鄭之扁鵲漢之陽慶倉公更如長沙河間東垣丹溪立齊肯堂諸大家各有著述無不表表今誦兆期之篇博綜反約採珠璣於淵藪徹性命之精微挈領朝宗臻於盡善立德立言上有功於千聖為後學津梁真金石不磨裴子健飛上承父志悟其神理播其仁術凡刀圭之入口者靡不頃刻立起寧止徒讀父書實可見之經濟宜乎其名不脛而馳遠邇響慕爭赴無虛日也余於裴氏喬梓為通家世講素交最久聞見最真不敢浪作浮譽故直泐數言以棄其首通家眷弟陳子遵道升氏題
